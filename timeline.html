<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>時間軸檢視 — 醫療糾紛事件時間軸</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --toolbar-h: 52px; --subbar-h: 0px; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fa;
      min-height: 100vh;
    }

    /* ─── TOOLBAR ─── */
    .toolbar {
      position: fixed; top: 0; left: 0; right: 0; height: var(--toolbar-h);
      background: white; border-bottom: 1px solid #e0e0e0;
      display: flex; align-items: center; padding: 0 20px; gap: 12px; z-index: 100;
    }
    .toolbar h1 { font-size: 17px; font-weight: 600; color: #333; white-space: nowrap; }
    .toolbar .condition-select {
      font-size: 14px; color: #374151; background: #f3f4f6;
      border: 1px solid #e5e7eb; border-radius: 12px;
      padding: 4px 10px; min-width: 220px;
    }
    .toolbar .spacer { flex: 1; }
    .toolbar a.nav-link {
      color: #64748b; text-decoration: none; font-size: 13px; font-weight: 500;
      padding: 6px 12px; border-radius: 8px; transition: all 0.15s;
    }
    .toolbar a.nav-link:hover { background: #eef2ff; color: #4f46e5; text-decoration: none; }
    .toolbar a.nav-link.active { background: #4f46e5; color: #fff; }

    .volume-pill {
      font-family: inherit; font-size: 13px; font-weight: 500;
      padding: 6px 16px; border: 1px solid #cbd5e1; border-radius: 20px;
      background: white; cursor: pointer; color: #334155; transition: all 0.15s;
    }
    .volume-pill:hover { border-color: #4f46e5; color: #4f46e5; }
    .volume-pill.active { background: #4f46e5; color: white; border-color: #4f46e5; }
    .volume-pill-count { font-size: 11px; opacity: 0.75; margin-left: 4px; }
    #volModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:9000; align-items:center; justify-content:center; }
    #volModal.show { display:flex; }
    #volModalBox { background:#fff; border-radius:10px; padding:20px 24px; width:520px; max-height:80vh; overflow-y:auto; box-shadow:0 8px 32px rgba(0,0,0,.18); }
    #volModalTitle { font-size:16px; font-weight:700; margin-bottom:14px; display:flex; align-items:center; justify-content:space-between; }
    .vol-modal-row {
      display:grid; grid-template-columns:1fr auto; align-items:center; gap:8px; padding:8px 10px;
      border-bottom:1px solid #f1f5f9; font-size:13px; border-radius:8px; cursor:pointer;
      transition: background .15s, box-shadow .15s;
    }
    .vol-modal-row:hover { background:#f8fafc; }
    .vol-modal-row.current { background:#eef2ff; box-shadow: inset 0 0 0 1px rgba(79,70,229,0.18); }
    .vol-modal-name {
      border:none; background:transparent; text-align:left; cursor:pointer; padding:0;
      font-size:13px; font-family:inherit; color:inherit;
    }
    .vol-modal-name:hover { text-decoration: underline; }

    /* ─── MOBILE TOOLBAR ELEMENTS (hidden on desktop) ─── */
    .mobile-case-badge, .mobile-menu-btn, .mobile-backdrop { display: none; }
    .toolbar-controls { display: contents; }
    .ctrl-label { display: none; }
    .ctrl-row, .ctrl-row-nav { display: contents; }
    .ctrl-row-case-btn { display: none; }
    .ctrl-row-nav { display: contents; }
    .badge {
      display: inline-flex; align-items: center; gap: 4px; font-size: 11px;
      padding: 3px 10px; border-radius: 999px; font-weight: 600;
    }
    .badge.critical { background: #fef2f2; color: #b91c1c; }

    /* ─── MAIN LAYOUT ─── */
    .main {
      display: flex; margin-top: calc(var(--toolbar-h) + var(--subbar-h)); height: calc(100vh - var(--toolbar-h) - var(--subbar-h));
    }
    .content-area { flex: 1; overflow-y: auto; background: #fafafa; }
    .content-inner { padding: 18px 24px; }
    .panel-card {
      background: white; border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden;
    }
    .panel-head {
      min-height: 48px; padding: 10px 16px; border-bottom: 1px solid #f3f4f6; background: #fafafa;
      display: flex; flex-direction: column; justify-content: center;
    }
    .panel-kicker { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; color: #8b5cf6; margin-bottom: 4px; }
    .panel-title { font-size: 15px; font-weight: 600; color: #111827; }
    .panel-meta { font-size: 12px; color: #6b7280; margin-top: 4px; }

    /* ─── TWO-COLUMN LAYOUT ─── */
    .tl-columns { display: flex; gap: 20px; align-items: stretch; }
    .tl-col-left {
      flex: 44; min-width: 0; position: sticky; top: 0;
      max-height: calc(100vh - var(--toolbar-h) - var(--subbar-h));
      display: flex; flex-direction: column;
    }
    .tl-col-right { flex: 56; min-width: 0; display: flex; flex-direction: column; }
    .source-stack { display: flex; flex-direction: column; gap: 14px; min-height: 0; }
    .source-panel { flex: 1; min-height: 0; }
    .timeline-panel-card { flex: 1; min-height: 0; display: flex; flex-direction: column; }
    .timeline-panel-body { padding: 20px 22px 24px; overflow-y: auto; flex: 1; min-height: 0; }

    /* ─── SOURCE PANEL (full text with highlighter) ─── */
    .source-panel {
      background: white; border: 1px solid #e5e7eb; border-radius: 10px;
      min-height: 200px; display: flex; flex-direction: column;
    }
    .source-panel-body {
      font-size: 14px; color: #475569; line-height: 1.85;
      padding: 14px 18px; white-space: pre-wrap; word-break: break-all;
      flex: 1; overflow-y: auto;
    }
    .legend-swatch { width: 10px; height: 10px; border-radius: 999px; }
    .legend-swatch.primary { background: #facc15; }
    .legend-swatch.supporting { background: #bfdbfe; }
    /* Chunk regions — invisible by default, highlighter pen on active */
    .chunk-region { border-radius: 2px; transition: all 0.3s; }
    .chunk-region mark {
      background: transparent; color: inherit;
      padding: 1px 0; border-radius: 2px;
      box-decoration-break: clone; -webkit-box-decoration-break: clone;
      transition: background 0.3s;
    }
    /* Only evt-highlight.active gets yellow, not all marks */
    .chunk-region.active {
      border-left: 3px solid #eab308; padding-left: 12px; margin-left: -15px;
    }
    .chunk-label {
      display: none; font-size: 9px; font-weight: 700;
      color: #d97706; background: #fef3c7;
      padding: 1px 5px; border-radius: 3px;
      vertical-align: middle; margin-right: 3px;
    }
    .chunk-region.active .chunk-label { display: inline; }
    /* Precise event highlight within a chunk */
    .evt-highlight { transition: background 0.3s; border-radius: 2px; }
    .evt-highlight.active {
      background: #fef3c7; box-shadow: none;
    }
    .evt-highlight[data-role="supporting"].active {
      background: #dbeafe; box-shadow: none;
    }
    .evt-highlight.selected {
      outline: none;
      text-decoration: none;
      box-shadow: inset 0 -2px 0 rgba(217, 119, 6, 0.16);
    }
    .evt-highlight[data-role="supporting"].selected {
      box-shadow: inset 0 -2px 0 rgba(37, 99, 235, 0.14);
    }
    .evt-highlight[data-role="primary"][data-status="MATCH_FUZZY"].active {
      outline: 1px dashed rgba(217, 119, 6, 0.24);
    }
    .evt-highlight[data-role="supporting"][data-status="MATCH_FUZZY"].active {
      outline: 1px dashed rgba(37, 99, 235, 0.24);
    }
    .evt-highlight[data-status="UNRESOLVED"] { text-decoration: underline dotted #ef4444; }
    .chunk-region.focus-pulse {
      animation: sourcePulse 1.25s ease;
    }
    .tl-event.focus-pulse {
      animation: eventPulse 0.9s ease;
    }
    @keyframes sourcePulse {
      0% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.0); }
      25% { box-shadow: 0 0 0 8px rgba(234, 179, 8, 0.18); }
      100% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.0); }
    }
    @keyframes eventPulse {
      0% { transform: translateX(0); }
      35% { transform: translateX(-2px); box-shadow: 0 4px 16px rgba(79,70,229,0.18); }
      100% { transform: translateX(0); }
    }
    .source-panel-empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 160px; color: #d1d5db; text-align: center;
    }
    .source-panel-empty svg { margin-bottom: 10px; opacity: 0.5; }
    .source-panel-empty span { font-size: 13px; }
    .source-switcher {
      display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end;
    }
    .span-tab {
      appearance: none; -webkit-appearance: none;
      display: inline-flex; align-items: center; gap: 6px;
      font-family: inherit; font-size: 12px; font-weight: 600;
      padding: 5px 12px; border-radius: 999px; border: 1px solid #dbeafe;
      background: #f8fafc; color: #64748b; cursor: pointer; line-height: 1.4;
      box-shadow: none; outline: none;
    }
    .span-tab:hover { border-color: #bfdbfe; color: #475569; }
    .span-tab.active {
      background: #eff6ff; border-color: #93c5fd; color: #1d4ed8;
    }
    .source-switcher-hint {
      font-size: 12px; color: #94a3b8;
    }
    .tl-span-pill {
      appearance: none; -webkit-appearance: none;
      display: inline-flex; align-items: center; gap: 6px;
      font-family: inherit; font-size: 12px; font-weight: 600;
      padding: 3px 10px; border-radius: 999px; border: 1px solid #dbeafe;
      background: #f8fafc; color: #64748b; cursor: pointer; line-height: 1.4;
      box-shadow: none; outline: none;
      transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
    }
    .tl-span-pill:hover {
      border-color: #93c5fd; background: #f0f9ff; color: #334155;
      box-shadow: 0 2px 10px rgba(59, 130, 246, 0.10);
      transform: translateY(-1px);
    }
    .tl-span-pill.active {
      background: #eff6ff; border-color: #93c5fd; color: #1d4ed8;
    }
    .tl-span-pill.active:hover {
      background: #dbeafe; border-color: #60a5fa; color: #1d4ed8;
      box-shadow: 0 2px 10px rgba(59, 130, 246, 0.14);
    }

    /* ─── SUMMARY BANNER ─── */
    .tl-summary {
      display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap;
      padding: 10px 12px; background: white; border: 1px solid #e5e7eb; border-radius: 12px;
    }
    .tl-summary-chip {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 12px; border-radius: 999px; background: #f8fafc;
      border: 1px solid #e2e8f0; color: #334155;
    }
    .tl-summary-chip.events {
      background: #f8fafc;
      border-color: #cbd5e1;
    }
    .tl-summary-chip.critical {
      background: #fef2f2;
      border-color: #fecaca;
      color: #991b1b;
    }
    .tl-summary-chip.critical .tl-summary-label,
    .tl-summary-chip.critical .tl-summary-value {
      color: #dc2626;
    }
    .tl-summary-chip.span {
      background: #faf5ff;
      border-color: #ddd6fe;
      color: #5b21b6;
    }
    .tl-summary-chip.span .tl-summary-label {
      color: #8b5cf6;
    }
    .tl-summary-chip.duration {
      background: #eff6ff;
      border-color: #bfdbfe;
      color: #1d4ed8;
    }
    .tl-summary-chip.duration .tl-summary-label {
      color: #60a5fa;
    }
    .tl-summary-label {
      font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700;
    }
    .tl-summary-value { font-size: 13px; font-weight: 700; color: #0f172a; }
    .tl-summary-value.small { font-size: 13px; font-weight: 600; }

    /* ─── TIMELINE ─── */
    .timeline { position: relative; padding-left: 28px; }
    .timeline::before {
      content: ''; position: absolute; left: 10px; top: 0; bottom: 0;
      width: 2px; background: #e5e7eb;
    }
    .tl-event {
      position: relative; margin-bottom: 16px;
      background: white; border: 1px solid #e5e7eb; border-radius: 10px;
      padding: 14px 18px; transition: all 0.15s; cursor: pointer;
    }
    .tl-event::before {
      content: ''; position: absolute; left: -22px; top: 18px;
      width: 10px; height: 10px; border-radius: 50%;
      background: #d1d5db; border: 2px solid #fff;
      box-shadow: 0 0 0 2px #e5e7eb;
    }
    .tl-event:hover { border-color: #4f46e5; box-shadow: 0 2px 12px rgba(79,70,229,0.08); }
    .tl-event.active-source { border-color: #4f46e5; box-shadow: 0 2px 12px rgba(79,70,229,0.12); }
    .tl-event.critical::before { background: #dc2626; box-shadow: 0 0 0 2px #fecaca; }
    .tl-event.critical { border-left: 3px solid #dc2626; }
    .tl-event.critical:hover { border-color: #dc2626; box-shadow: 0 2px 12px rgba(220,38,38,0.10); }
    .tl-event.critical.active-source { border-color: #dc2626; box-shadow: 0 2px 12px rgba(220,38,38,0.12); }

    .tl-event-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
    .tl-date { font-size: 13px; font-weight: 600; color: #4f46e5; }
    .tl-event.critical .tl-date { color: #dc2626; }
    .tl-event-type {
      font-size: 10px; padding: 2px 8px; border-radius: 4px;
      background: #f3f4f6; color: #6b7280; font-weight: 500;
    }
    .tl-event-type.critical_decision { background: #fef2f2; color: #b91c1c; }
    .tl-event-type.initial_contact { background: #ecfdf5; color: #047857; }
    .tl-event-type.final_outcome { background: #fefce8; color: #a16207; }
    .tl-event-type.deterioration { background: #fff7ed; color: #c2410c; }

    .tl-desc { font-size: 13px; color: #333; line-height: 1.6; }
    .tl-meta { display: flex; gap: 16px; margin-top: 8px; flex-wrap: wrap; }
    .tl-meta-item { font-size: 11px; color: #9ca3af; }
    .tl-meta-item strong { color: #6b7280; font-weight: 500; }

    .tl-decision {
      margin-top: 8px; padding: 8px 12px; background: #fef2f2; border-radius: 6px;
      font-size: 12px; color: #991b1b; line-height: 1.5;
    }
    .tl-decision-label { font-weight: 600; margin-bottom: 2px; }
    .tl-evidence-row {
      display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px;
    }
    .tl-event-evidence { display: none; }
    .tl-event.active-source .tl-event-evidence { display: block; }

    /* ─── MOBILE: collapsible source (hidden on desktop) ─── */
    .tl-source-toggle {
      display: none;
      align-items: center; gap: 4px;
      margin-top: 8px; padding: 0; border: none; background: none;
      font-size: 11px; color: #9ca3af; cursor: pointer; transition: color 0.15s;
    }
    .tl-source-toggle:hover { color: #4f46e5; }
    .tl-source-toggle svg { transition: transform 0.2s; }
    .tl-source-toggle.open svg { transform: rotate(90deg); }
    .tl-source-text {
      display: none; margin-top: 6px; padding: 10px 12px;
      background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px;
      font-size: 12px; color: #475569; line-height: 1.7;
      border-left: 3px solid #cbd5e1; white-space: pre-wrap; word-break: break-all;
    }
    .tl-source-text.open { display: block; }
    .tl-source-text mark {
      background: #fef9c3; color: #475569;
      padding: 1px 0; border-radius: 2px;
      box-decoration-break: clone; -webkit-box-decoration-break: clone;
    }

    /* ─── EMPTY/LOADING ─── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 60%; color: #9ca3af; text-align: center;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
    .empty-state .msg { font-size: 15px; }
    .loading { display: flex; align-items: center; justify-content: center; height: 100%; color: #999; }
    .loading::after {
      content: ''; width: 24px; height: 24px; border: 2px solid #e0e0e0;
      border-top-color: #4f46e5; border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── RESPONSIVE: TABLET ─── */
    @media (max-width: 1024px) {
      .content-inner { padding: 20px; }
      .tl-columns { gap: 16px; }
      .tl-col-left { flex: 42; }
      .tl-col-right { flex: 58; }
      .source-switcher { justify-content: flex-start; }
    }

    /* ─── RESPONSIVE: MOBILE ─── */
    @media (max-width: 768px) {
      :root { --toolbar-h: 50px; }
      .toolbar { height: var(--toolbar-h); overflow: visible; flex-wrap: nowrap !important;
                 justify-content: space-between; padding: 0 12px !important; gap: 8px !important; }
      .toolbar h1 { font-size: 15px !important; }
      .toolbar .spacer { display: none; }
      .toolbar .condition-select { min-width: 0; width: 100%; font-size: 15px; padding: 10px 12px; }

      .mobile-case-badge {
        display: flex; align-items: center;
        font-size: 12px; font-weight: 600; color: #4f46e5;
        background: #eef2ff; padding: 4px 10px; border-radius: 20px;
        white-space: nowrap; cursor: pointer; flex-shrink: 1;
        min-width: 0; overflow: hidden; text-overflow: ellipsis;
        max-width: 45vw;
      }
      .mobile-menu-btn {
        display: flex; align-items: center; justify-content: center;
        width: 36px; height: 36px; border: 1px solid #cbd5e1;
        border-radius: 8px; background: white; font-size: 20px;
        cursor: pointer; color: #334155; flex-shrink: 0;
      }

      .mobile-backdrop {
        display: none; position: fixed; top: var(--toolbar-h); left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.25); z-index: 98;
      }
      .mobile-backdrop.open { display: block; }

      .toolbar-controls {
        display: none !important; position: absolute; top: var(--toolbar-h); left: 0; right: 0;
        background: white; padding: 16px; flex-direction: column; gap: 14px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.12); border-radius: 0 0 12px 12px; z-index: 99;
      }
      .toolbar-controls.open { display: flex !important; }

      .ctrl-label { display: block; font-size: 12px; font-weight: 600; color: #64748b; margin-bottom: 4px; }
      .ctrl-row { display: flex; flex-direction: column; }
      .ctrl-row-nav {
        display: flex; flex-direction: row; gap: 6px; justify-content: center;
      }
      .ctrl-row-nav a {
        flex: 1; text-align: center; padding: 10px 0; border-radius: 8px;
        background: #eef2ff; color: #4f46e5 !important; font-size: 14px !important;
        font-weight: 500; text-decoration: none !important;
      }

      .main { flex-direction: column; margin-top: calc(var(--toolbar-h) + var(--subbar-h)) !important; height: auto; min-height: calc(100vh - var(--toolbar-h) - var(--subbar-h)) !important; }
      .content-area { padding: 0; flex: 1; }
      .content-inner { padding: 16px 12px; }
      .tl-summary { gap: 8px; padding: 10px; }
      .tl-summary-chip { width: 100%; justify-content: space-between; }
      .tl-summary-value { font-size: 13px; }
      .tl-event { padding: 12px 14px; cursor: default; }
      .tl-desc { font-size: 12px; }
      .tl-meta { gap: 8px; }

      .tl-columns { flex-direction: column; }
      .tl-col-left { flex: 1; position: static; max-height: none; width: 100%; }
      .tl-col-right { flex: 1; position: static; max-height: none; width: 100%; }
      .timeline-panel-body { overflow: visible; }
      .tl-source-toggle { display: inline-flex; }
    }
    @media (min-width: 769px) {
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <h1>時間軸檢視</h1>
    <span class="mobile-case-badge" id="mobileCaseBadge" onclick="toggleMobileDrawer()">選擇案件</span>
    <button class="mobile-menu-btn" onclick="toggleMobileDrawer()">&#9776;</button>

    <div class="toolbar-controls" id="toolbarControls">
      <div class="ctrl-row">
        <label class="ctrl-label">案件</label>
        <select class="condition-select" id="caseSelect"></select>
      </div>
      <span class="spacer"></span>
      <div class="ctrl-row-nav">
        <a id="viewNavLink" class="nav-link" href="view.html?v=20260328a">摘要檢視</a>
        <a id="timelineNavLink" class="nav-link active" href="timeline.html?v=20260328a">時間軸檢視</a>
        <a class="nav-link" href="metrics.html?v=20260328a">AI 評估指標</a>
        <a id="evalLink" class="nav-link" href="eval.html?v=20260328a">專家評估</a>
        <a class="nav-link" href="index.html?v=20260328a">首頁</a>
      </div>
    </div>
  </div>
  <div class="mobile-backdrop" id="mobileBackdrop" onclick="closeMobileDrawer()"></div>
  <div id="volModal" onclick="if(event.target===this)closeVolModal()">
    <div id="volModalBox">
      <div id="volModalTitle">
        <span id="volModalLabel"></span>
        <button onclick="closeVolModal()" style="background:none;border:none;font-size:18px;cursor:pointer;color:#64748b;">✕</button>
      </div>
      <div id="volModalList"></div>
    </div>
  </div>

  <div class="main">
    <div class="content-area" id="contentArea">
      <div class="empty-state">
        <div class="icon">📅</div>
        <div class="msg">選擇案件以檢視事件時間軸</div>
      </div>
    </div>
  </div>
  <script src="versioning.js"></script>
  <script>
    let allCases = [];
    let caseSlugs = {};
    let caseInfo = {};
    let currentCase = null;
    let timelineData = null;
    let activeEventIdx = -1;
    let activeSpanId = null;
    let lastScrolledEventIdx = -1;
    let sourceScrollTimer = null;

    function getCaseDisplay(name) {
      const info = caseInfo[name] || {};
      return info.display || name;
    }

    async function init() {
      try {
        await loadSiteVersion();
        const manifest = await (await fetch('./data/manifest.json')).json();
        allCases = manifest.cases || [];
        caseSlugs = manifest.case_slugs || {};
        caseInfo = manifest.case_info || {};
      } catch { allCases = []; }
      const contentArea = document.getElementById('contentArea');
      if (contentArea && !contentArea.dataset.boundSpanPills) {
        contentArea.addEventListener('click', (event) => {
          const pill = event.target.closest('.tl-span-pill[data-evt][data-span-id]');
          if (!pill) return;
          event.stopPropagation();
          const evtIdx = Number(pill.dataset.evt);
          const spanId = pill.dataset.spanId == null ? null : String(pill.dataset.spanId);
          if (Number.isNaN(evtIdx)) return;
          selectSpan(evtIdx, spanId);
        });
        contentArea.dataset.boundSpanPills = '1';
      }
      renderCaseSelector();
      const params = new URLSearchParams(location.search);
      const caseParam = params.get('case');
      if (params.has('source')) {
        const url = new URL(location.href);
        url.searchParams.delete('source');
        history.replaceState({}, '', url.toString());
      }
      if (caseParam && allCases.includes(caseParam)) selectCase(caseParam);
      else if (allCases.length > 0) selectCase(allCases[0]);
      updateMobileCaseBadge();
    }

    function renderCaseSelector() {
      const select = document.getElementById('caseSelect');
      const volumes = ['上冊', '中冊', '下冊'];
      const byVol = {};
      volumes.forEach(v => { byVol[v] = []; });
      allCases.forEach(c => {
        const vol = (caseInfo[c] || {}).volume || '';
        if (byVol[vol]) byVol[vol].push(c);
      });
      let html = '';
      volumes.forEach(vol => {
        if (!byVol[vol] || !byVol[vol].length) return;
        html += `<optgroup label="${esc(vol)}">`;
        byVol[vol].forEach(c => {
          const selected = c === currentCase ? 'selected' : '';
          html += `<option value="${esc(c)}" ${selected}>${esc(getCaseDisplay(c))}</option>`;
        });
        html += '</optgroup>';
      });
      select.innerHTML = html;
      if (!select.dataset.bound) {
        select.addEventListener('change', () => {
          closeMobileDrawer();
          selectCase(select.value);
        });
        select.dataset.bound = '1';
      }
    }

    function openVolModal(volName) {
      const cases = allCases.filter(c => ((caseInfo[c] || {}).volume || '') === volName);
      document.getElementById('volModalLabel').textContent = `${volName}（${cases.length} 案）`;
      document.getElementById('volModalList').innerHTML = cases.map(c => {
        const rowCls = c === currentCase ? 'vol-modal-row current' : 'vol-modal-row';
        return `<div class="${rowCls}" onclick='jumpToCaseFromVolModal(${JSON.stringify(c)})'>
          <button class="vol-modal-name" onclick='event.stopPropagation();jumpToCaseFromVolModal(${JSON.stringify(c)})'>${esc(getCaseDisplay(c))}</button>
          <span style="font-size:12px;color:#94a3b8;">切換</span>
        </div>`;
      }).join('');
      document.getElementById('volModal').classList.add('show');
    }

    function closeVolModal() {
      document.getElementById('volModal').classList.remove('show');
    }

    function jumpToCaseFromVolModal(caseName) {
      closeVolModal();
      if (!caseName) return;
      selectCase(caseName);
    }

    async function selectCase(caseName) {
      currentCase = caseName;
      timelineData = null;
      activeEventIdx = -1;
      activeSpanId = null;
      const select = document.getElementById('caseSelect');
      if (select) select.value = caseName;
      const url = new URL(location.href);
      url.searchParams.set('case', caseName);
      url.searchParams.delete('source');
      history.replaceState({}, '', url.toString());
      const sl = document.getElementById('viewNavLink');
      if (sl) sl.href = versionedHref(`view.html?case=${encodeURIComponent(caseName)}`);
      const evl = document.getElementById('evalLink');
      if (evl) evl.href = versionedHref(`eval.html?case=${encodeURIComponent(caseName)}`);

      const contentArea = document.getElementById('contentArea');
      contentArea.innerHTML = '<div class="loading">載入時間軸中</div>';

      const slug = caseSlugs[caseName] || caseName;
      try {
        const res = await fetch(`./data/timeline_v310/${slug}.json`);
        if (!res.ok) throw new Error('not found');
        timelineData = await res.json();
        renderEvents();
      } catch {
        contentArea.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><div class="msg">此案件目前無 v3.10.4 時間軸資料</div></div>`;
      }
      updateMobileCaseBadge();
    }

    function getEventSpans(evt) {
      if (!evt) return [];
      const raw = Array.isArray(evt.source_spans) ? evt.source_spans.filter(Boolean) : [];
      const spans = raw
        .map((sp, idx) => ({
          span_id: String(sp.span_id || `span_${idx + 1}`),
          role: sp.role || 'supporting',
          quote: sp.quote || '',
          char_start: Number.isInteger(sp.char_start) ? sp.char_start : -1,
          char_end: Number.isInteger(sp.char_end) ? sp.char_end : -1,
          alignment_status: sp.alignment_status || evt.alignment_status || 'UNRESOLVED'
        }))
        .filter(sp => sp.char_start >= 0 && sp.char_end > sp.char_start);
      if (spans.length) return spans;
      if (evt.char_start != null && evt.char_end != null && evt.char_start >= 0 && evt.char_end > evt.char_start) {
        return [{
          span_id: 'event_range',
          role: 'primary',
          quote: evt.extraction_text || '',
          char_start: evt.char_start,
          char_end: evt.char_end,
          alignment_status: evt.alignment_status || 'UNRESOLVED'
        }];
      }
      return [];
    }

    function getEventAlignmentSummary(evt) {
      const spans = getEventSpans(evt);
      if (!spans.length) return { total: 0, primary: 0, supporting: 0, status: 'unresolved' };
      const primary = spans.filter(sp => sp.role === 'primary').length || 1;
      const supporting = Math.max(0, spans.length - primary);
      const statuses = spans.map(sp => sp.alignment_status);
      let status = 'exact';
      if (statuses.some(s => s === 'UNRESOLVED')) status = 'unresolved';
      else if (statuses.some(s => s === 'PARTIAL_UNRESOLVED')) status = 'partial';
      else if (statuses.some(s => s === 'MATCH_FUZZY')) status = 'fuzzy';
      return { total: spans.length, primary, supporting, status };
    }

    function getActiveSpan(evt) {
      const spans = getEventSpans(evt);
      if (!spans.length) return null;
      const primary = spans.find(sp => sp.role === 'primary');
      if (activeSpanId) {
        const found = spans.find(sp => sp.span_id === String(activeSpanId));
        if (found) return found;
      }
      return primary || spans[0];
    }

    function renderEventSpanSwitcher(evt, evtIdx) {
      const spans = getEventSpans(evt);
      if (!spans.length) return '';
      const activeForEvent = activeEventIdx === evtIdx ? getActiveSpan(evt) : null;
      const supportingTotal = spans.filter(sp => sp.role !== 'primary').length;
      let supportingIndex = 0;
      let html = '<div class="tl-evidence-row">';
      spans.forEach(sp => {
        const activeCls = activeForEvent && activeForEvent.span_id === sp.span_id ? ' active' : '';
        const title = sp.role === 'primary'
          ? '主證據'
          : (supportingTotal <= 1 ? '補充證據' : `補充證據 ${++supportingIndex}`);
        const swatchClass = sp.role === 'primary' ? 'primary' : 'supporting';
        html += `<button class="tl-span-pill${activeCls}" data-evt="${evtIdx}" data-span-id="${esc(sp.span_id)}"><span class="legend-swatch ${swatchClass}"></span>${esc(title)}</button>`;
      });
      html += '</div>';
      return html;
    }

    function updateEventSpanPills() {
      document.querySelectorAll('.tl-span-pill').forEach(el => {
        const evtIdx = Number(el.dataset.evt);
        const spanId = String(el.dataset.spanId || '');
        const isActive = evtIdx === activeEventIdx && spanId === String(activeSpanId || '');
        el.classList.toggle('active', isActive);
      });
    }

    function getSpanAnchorId(evtIdx, spanId) {
      return `span_anchor_${evtIdx}_${String(spanId).replace(/[^a-zA-Z0-9_-]/g, '_')}`;
    }

    function getOffsetTopWithin(element, ancestor) {
      let top = 0;
      let node = element;
      while (node && node !== ancestor) {
        top += node.offsetTop || 0;
        node = node.offsetParent;
      }
      return top;
    }

    function normalizeLooseText(text) {
      return String(text || '').replace(/\s+/g, '');
    }

    function refineSpanRangeInChunk(chunkContent, relStart, relEnd, quote) {
      const rawQuote = String(quote || '');
      if (!rawQuote) return null;
      const windowPad = 120;
      const searchStart = Math.max(0, relStart - windowPad);
      const searchEnd = Math.min(chunkContent.length, relEnd + windowPad);
      const windowText = chunkContent.slice(searchStart, searchEnd);

      const exactIdx = windowText.indexOf(rawQuote);
      if (exactIdx >= 0) {
        return {
          relStart: searchStart + exactIdx,
          relEnd: searchStart + exactIdx + rawQuote.length,
          method: 'exact_in_window'
        };
      }

      const normalizedQuote = normalizeLooseText(rawQuote);
      if (!normalizedQuote) return null;

      const normalizedChars = [];
      const indexMap = [];
      for (let i = 0; i < windowText.length; i += 1) {
        const ch = windowText[i];
        if (!/\s/.test(ch)) {
          normalizedChars.push(ch);
          indexMap.push(i);
        }
      }
      const normalizedWindow = normalizedChars.join('');
      const normalizedIdx = normalizedWindow.indexOf(normalizedQuote);
      if (normalizedIdx < 0) return null;

      const origStart = indexMap[normalizedIdx];
      const origEnd = indexMap[normalizedIdx + normalizedQuote.length - 1] + 1;
      return {
        relStart: searchStart + origStart,
        relEnd: searchStart + origEnd,
        method: 'normalized_in_window'
      };
    }

    function findChunkForEvent(evt) {
      const chunks = (timelineData && timelineData.chunks) || [];
      const spans = getEventSpans(evt);
      if (!spans.length) return null;
      for (const span of spans) {
        for (const chunk of chunks) {
          if (span.char_start >= chunk.start_char && span.char_start < chunk.end_char) return chunk;
        }
      }
      let best = null, bestOverlap = 0;
      for (const chunk of chunks) {
        for (const span of spans) {
          const overlapStart = Math.max(span.char_start, chunk.start_char);
          const overlapEnd = Math.min(span.char_end, chunk.end_char);
          const overlap = overlapEnd - overlapStart;
          if (overlap > bestOverlap) { bestOverlap = overlap; best = chunk; }
        }
      }
      return best;
    }

    // ─── Highlight extraction_text within chunk content ───
    function highlightInChunk(chunkContent, chunkStartChar, evt) {
      const escaped = esc(chunkContent);
      const extractionText = evt.extraction_text;
      if (!extractionText) return escaped;

      // Try direct substring match first
      const escExtraction = esc(extractionText);
      const idx = escaped.indexOf(escExtraction);
      if (idx !== -1) {
        return escaped.substring(0, idx)
          + '<mark>' + escExtraction + '</mark>'
          + escaped.substring(idx + escExtraction.length);
      }

      // Fallback: use char offsets relative to chunk
      if (evt.char_start != null && evt.char_end != null) {
        const relStart = evt.char_start - chunkStartChar;
        const relEnd = evt.char_end - chunkStartChar;
        if (relStart >= 0 && relEnd <= chunkContent.length) {
          const before = esc(chunkContent.substring(0, relStart));
          const mid = esc(chunkContent.substring(relStart, relEnd));
          const after = esc(chunkContent.substring(relEnd));
          return before + '<mark>' + mid + '</mark>' + after;
        }
      }

      return escaped;
    }

    function renderEvents() {
      const d = timelineData;
      const events = d.events || [];
      const chunks = d.chunks || [];
      const summary = d.timeline_summary || {};
      const span = summary.time_span || {};
      const criticalCount = events.filter(e => e.critical_decision).length;

      let html = '<div class="content-inner">';

      // Summary banner
      html += '<div class="tl-summary">';
      html += `<div class="tl-summary-chip events"><span class="tl-summary-label">事件數</span><span class="tl-summary-value">${events.length}</span></div>`;
      html += `<div class="tl-summary-chip critical"><span class="tl-summary-label">關鍵決策</span><span class="tl-summary-value">${criticalCount}</span></div>`;
      const spanStart = span.start_date || span.start || '';
      const spanEnd = span.end_date || span.end || '';
      if (spanStart) {
        const fmt = isoToMinguo(spanStart);
        const fmt2 = isoToMinguo(spanEnd, spanStart);
        let label = `${fmt} ~ ${fmt2}`;
        const d1 = new Date(spanStart), d2 = new Date(spanEnd);
        if (!isNaN(d1) && !isNaN(d2)) {
          const h = (d2 - d1) / 3600000;
          if (h > 0) label += `（共 ${h >= 24 ? Math.round(h/24)+' 天' : Math.round(h)+' 小時'}）`;
        }
        html += `<div class="tl-summary-chip duration"><span class="tl-summary-label">時間跨度</span><span class="tl-summary-value small">${esc(label)}</span></div>`;
      }
      html += `<div class="tl-summary-chip span"><span class="tl-summary-label">原文片段</span><span class="tl-summary-value">${chunks.length}</span></div>`;
      html += '</div>';

      // Workbench
      html += '<div class="tl-columns">';

      // Left column: timeline events
      html += '<div class="tl-col-left">';
      html += '<div class="panel-card timeline-panel-card">';
      html += '<div class="panel-head">';
      html += '<div class="panel-kicker">TIMELINE</div>';
      html += '<div class="panel-title">事件時間軸</div>';
      html += `<div class="panel-meta">${events.length} 個事件，點擊事件可同步查看原文</div>`;
      html += '</div>';
      html += '<div class="timeline-panel-body">';
      html += '<div class="timeline">';

      events.forEach((evt, idx) => {
        const isCritical = evt.critical_decision;
        const typeClass = isCritical ? 'critical_decision' : (evt.event_type || '');

        html += `<div class="tl-event ${isCritical ? 'critical' : ''}" data-idx="${idx}" onclick="showSource(${idx})">`;
        html += '<div class="tl-event-header">';
        html += `<span class="tl-date">${esc(evt.timestamp || evt.timestamp_normalized || '日期不明')}</span>`;
        if (evt.event_type) html += `<span class="tl-event-type ${esc(typeClass)}">${esc(formatEventType(evt.event_type))}</span>`;
        if (isCritical) html += '<span class="badge critical">關鍵決策</span>';
        html += '</div>';
        html += `<div class="tl-desc">${esc(evt.description || '')}</div>`;

        const meta = [];
        if (evt.actors && evt.actors.length) meta.push(`<span class="tl-meta-item"><strong>相關人員:</strong> ${esc(evt.actors.join(', '))}</span>`);
        if (evt.location) meta.push(`<span class="tl-meta-item"><strong>地點:</strong> ${esc(evt.location)}</span>`);
        if (evt.vital_signs && Object.keys(evt.vital_signs).length) {
          const vs = Object.entries(evt.vital_signs).map(([k,v])=>`${k}: ${v}`).join(', ');
          meta.push(`<span class="tl-meta-item"><strong>生命體徵:</strong> ${esc(vs)}</span>`);
        }
        if (meta.length) html += `<div class="tl-meta">${meta.join('')}</div>`;

        if (isCritical && evt.decision_content) {
          html += `<div class="tl-decision"><div class="tl-decision-label">決策內容</div>${esc(evt.decision_content)}</div>`;
        }
        html += '<div class="tl-event-evidence">';
        html += renderEventSpanSwitcher(evt, idx);
        html += '</div>';

        // Mobile-only collapsible (shows chunk with highlight)
        if (evt.extraction_text) {
          const chunk = findChunkForEvent(evt);
          const mobileContent = chunk
            ? highlightInChunk(chunk.content, chunk.start_char, evt)
            : '<mark>' + esc(evt.extraction_text) + '</mark>';
          html += `<button class="tl-source-toggle" onclick="event.stopPropagation(); toggleSource(${idx})">`;
          html += `<svg id="srcArrow${idx}" width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M4.5 2.5L8 6L4.5 9.5"/></svg>`;
          html += `查看原文</button>`;
          html += `<div class="tl-source-text" id="srcText${idx}">${mobileContent}</div>`;
        }

        html += '</div>';
      });

      html += '</div></div></div>'; // .timeline / padding / .panel-card
      html += '</div>'; // tl-col-left

      // Right column: source only
      html += '<div class="tl-col-right">';
      html += '<div class="source-stack">';
      html += '<div class="source-panel" id="sourcePanel">';
      html += '<div class="panel-head">';
      html += '<div class="panel-kicker">SOURCE</div>';
      html += `<div class="panel-title">原始判決書</div>`;
      html += `<div class="panel-meta">${chunks.length} 段原文片段</div>`;
      html += '</div>';
      html += '<div class="source-panel-body" id="sourcePanelBody">';

      if (chunks.length > 0) {
        const sorted = [...chunks].sort((a, b) => (a.start_char || 0) - (b.start_char || 0));
        sorted.forEach(chunk => {
          const cid = chunk.chunk_id || '';
          const evtSpans = [];
          events.forEach((evt, evtIdx) => {
            getEventSpans(evt).forEach(sp => {
              const overlapStart = Math.max(sp.char_start, chunk.start_char);
              const overlapEnd = Math.min(sp.char_end, chunk.end_char);
              if (overlapEnd > overlapStart) {
                let relStart = overlapStart - chunk.start_char;
                let relEnd = overlapEnd - chunk.start_char;
                const status = sp.alignment_status || evt.alignment_status || 'UNRESOLVED';
                if (status === 'MATCH_FUZZY' || status === 'PARTIAL_UNRESOLVED') {
                  const refined = refineSpanRangeInChunk(
                    chunk.content || '',
                    relStart,
                    relEnd,
                    sp.quote || ''
                  );
                  if (refined && refined.relEnd > refined.relStart) {
                    relStart = refined.relStart;
                    relEnd = refined.relEnd;
                  }
                }
                evtSpans.push({
                  relStart,
                  relEnd,
                  evtIdx: evtIdx,
                  role: sp.role || 'supporting',
                  status,
                  spanId: sp.span_id || '',
                  anchorId: getSpanAnchorId(evtIdx, sp.span_id || '')
                });
              }
            });
          });
          evtSpans.sort((a, b) => a.relStart - b.relStart);
          const content = chunk.content || '';
          let chunkHtml = '';
          let cursor = 0;
          evtSpans.forEach(sp => {
            if (sp.relStart > cursor) chunkHtml += esc(content.substring(cursor, sp.relStart));
            chunkHtml += `<mark id="${esc(sp.anchorId)}" class="evt-highlight" data-evt="${sp.evtIdx}" data-role="${esc(sp.role)}" data-status="${esc(sp.status)}" data-span-id="${esc(sp.spanId)}">${esc(content.substring(sp.relStart, sp.relEnd))}</mark>`;
            cursor = sp.relEnd;
          });
          if (cursor < content.length) chunkHtml += esc(content.substring(cursor));
          html += `<div class="chunk-region" id="chunk_${esc(cid)}" data-chunk="${esc(cid)}">`;
          const chunkMatch = cid.match(/chunk[_\s]*(\d+)/i);
          const shortLabel = chunkMatch ? `Chunk ${chunkMatch[1]}` : cid;
          html += `<span class="chunk-label">${esc(shortLabel)}</span>`;
          html += chunkHtml;
          html += '</div>';
        });
      } else {
        html += '<div class="source-panel-empty"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="1.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><span>此案件無段落資料</span></div>';
      }

      html += '</div></div></div>';

      html += '</div></div>'; // .tl-columns .content-inner
      document.getElementById('contentArea').innerHTML = html;
      if (events.length > 0 && activeEventIdx >= 0) showSource(activeEventIdx, false);
      else updateEventSpanPills();

    }

    function showSource(idx, scrollEvent = true) {
      if (!timelineData) return;
      const events = timelineData.events || [];
      const evt = events[idx];
      if (!evt) return;
      activeEventIdx = idx;
      const evtSpans = getEventSpans(evt);
      if (!evtSpans.length) activeSpanId = null;
      else if (!activeSpanId || !evtSpans.some(sp => sp.span_id === String(activeSpanId))) activeSpanId = (getActiveSpan(evt) || evtSpans[0]).span_id;
      else activeSpanId = String(activeSpanId);

      // Highlight active event card (no scroll — only visual)
      document.querySelectorAll('.tl-event').forEach(el => {
        el.classList.toggle('active-source', parseInt(el.dataset.idx) === idx);
        el.classList.remove('focus-pulse');
      });
      const activeCard = document.querySelector(`.tl-event[data-idx="${idx}"]`);
      if (activeCard) {
        void activeCard.offsetWidth;
        activeCard.classList.add('focus-pulse');
      }

      // Clear all previous chunk/event highlights
      document.querySelectorAll('.chunk-region.active').forEach(el => {
        el.classList.remove('active');
        el.classList.remove('focus-pulse');
      });
      document.querySelectorAll('.evt-highlight.active').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.evt-highlight.selected').forEach(el => el.classList.remove('selected'));

      const evtMarks = Array.from(document.querySelectorAll(`.evt-highlight[data-evt="${idx}"]`));
      const activeRegions = new Set();
      evtMarks.forEach(mark => {
        mark.classList.add('active');
        if (activeSpanId && mark.dataset.spanId === activeSpanId) {
          mark.classList.add('selected');
        }
        const region = mark.closest('.chunk-region');
        if (region) activeRegions.add(region);
      });

      if (!evtMarks.length) {
        const chunk = findChunkForEvent(evt);
        if (chunk) {
          const regionEl = document.getElementById('chunk_' + (chunk.chunk_id || ''));
          if (regionEl) activeRegions.add(regionEl);
        }
      }

      activeRegions.forEach(regionEl => {
        regionEl.classList.add('active');
        void regionEl.offsetWidth;
        regionEl.classList.add('focus-pulse');
      });

      if (scrollEvent) {
        const selectedAnchorId = activeSpanId ? getSpanAnchorId(idx, activeSpanId) : '';
        const selectedMark = selectedAnchorId ? document.getElementById(selectedAnchorId) : null;
        const scrollTarget = selectedMark || evtMarks[0] || [...activeRegions][0];
        if (scrollTarget) {
          requestAnimationFrame(() => {
            const body = document.getElementById('sourcePanelBody');
            const bodyIsScrollable = body && body.scrollHeight > body.clientHeight + 4;
            if (body && body.contains(scrollTarget) && bodyIsScrollable) {
              const targetTop = getOffsetTopWithin(scrollTarget, body);
              const nextTop = targetTop - Math.max(48, body.clientHeight * 0.28);
              body.scrollTo({ top: Math.max(0, nextTop), behavior: 'smooth' });
            } else {
              scrollTarget.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
          });
        }
      }
      updateEventSpanPills();
    }

    function selectSpan(evtIdx, spanId) {
      if (!timelineData || evtIdx < 0) return;
      activeEventIdx = evtIdx;
      activeSpanId = spanId == null ? null : String(spanId);
      showSource(evtIdx, true);
    }

    function isoToMinguo(iso, refIso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (isNaN(d)) return iso;
      const y = d.getFullYear() - 1911;
      const m = d.getMonth() + 1;
      const day = d.getDate();
      // If refIso provided and same year, omit 民國XX年
      if (refIso) {
        const ref = new Date(refIso);
        if (!isNaN(ref) && ref.getFullYear() === d.getFullYear()) {
          return `${m}月${day}日`;
        }
      }
      return `民國${y}年${m}月${day}日`;
    }

    function formatEventType(type) {
      const map = {
        initial_contact: '初始接觸', diagnosis: '診斷', treatment: '治療處置',
        critical_decision: '關鍵決策', transfer: '轉院', deterioration: '病情惡化',
        final_outcome: '最終結果', surgery: '手術', medication: '用藥', consultation: '會診',
      };
      return map[type] || type;
    }

    function toggleSource(idx) {
      const btn = document.querySelector(`#srcArrow${idx}`).parentElement;
      const txt = document.getElementById(`srcText${idx}`);
      btn.classList.toggle('open');
      txt.classList.toggle('open');
    }

    function esc(text) {
      const div = document.createElement('div');
      div.textContent = text == null ? '' : String(text);
      return div.innerHTML;
    }

    function toggleMobileDrawer() {
      const controls = document.getElementById('toolbarControls');
      const backdrop = document.getElementById('mobileBackdrop');
      if (controls.classList.contains('open')) {
        closeMobileDrawer();
      } else {
        controls.classList.add('open');
        backdrop.classList.add('open');
      }
    }
    function closeMobileDrawer() {
      document.getElementById('toolbarControls').classList.remove('open');
      document.getElementById('mobileBackdrop').classList.remove('open');
    }
    function updateMobileCaseBadge() {
      const badge = document.getElementById('mobileCaseBadge');
      const display = currentCase ? getCaseDisplay(currentCase) : '選擇案件';
      if (badge) badge.textContent = display;
    }

    init();
  </script>
</body>
</html>
