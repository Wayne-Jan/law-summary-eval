<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摘要檢視</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --toolbar-h: 52px; --subbar-h: 42px; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
        }

        /* Toolbar */
        .toolbar {
            position: fixed;
            top: 0; left: 0; right: 0; height: var(--toolbar-h);
            background: white; border-bottom: 1px solid #e0e0e0;
            display: flex; align-items: center;
            padding: 0 20px; gap: 12px; z-index: 100;
        }

        .toolbar h1 { font-size: 18px; font-weight: 700; color: #333; white-space: nowrap; }

        .toolbar .condition-label { font-size: 14px; color: #6b7280; }

        .toolbar .condition-select {
            font-size: 14px; color: #374151; background: #f3f4f6;
            border: 1px solid #e5e7eb; border-radius: 12px;
            padding: 4px 10px; min-width: 180px;
        }

        .toolbar .spacer { flex: 1; }
        .toolbar a.nav-link {
            color: #64748b; text-decoration: none; font-size: 13px; font-weight: 500;
            padding: 6px 12px; border-radius: 8px; transition: all 0.15s;
        }
        .toolbar a.nav-link:hover { background: #eef2ff; color: #4f46e5; text-decoration: none; }
        .toolbar a.nav-link.active { background: #4f46e5; color: #fff; }

        .toolbar .mode-select {
            font-size: 14px; color: #374151; background: #f9fafb;
            border: 1px solid #e5e7eb; border-radius: 10px; padding: 4px 8px;
        }

        /* Mobile toolbar elements — hidden on desktop */
        .mobile-case-badge, .mobile-menu-btn, .mobile-backdrop { display: none; }
        .mobile-case-badge .case-badge-icon { flex: 0 0 auto; }
        .mobile-case-badge .case-badge-text {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .toolbar-controls { display: contents; }
        .ctrl-label { display: none; }
        .ctrl-row, .ctrl-row-half, .ctrl-row-half > div, .ctrl-row-nav { display: contents; }

        .progress-subbar {
            position: fixed; top: var(--toolbar-h); left: 0; right: 0; height: var(--subbar-h);
            background: white; border-bottom: 1px solid #e2e8f0;
            display: flex; align-items: center; padding: 0 16px; gap: 10px; z-index: 99;
        }
        .progress-subbar .vol-block {
            display: inline-flex; align-items: center; gap: 8px;
            cursor: pointer; border-radius: 6px; padding: 6px 12px;
            transition: background .15s, box-shadow .15s, transform .15s, border-color .15s;
            border: 1px solid #e2e8f0; background: #fff;
            font-size: 12px; font-weight: 600; color: #64748b;
        }
        .progress-subbar .vol-block:hover { transform: translateY(-1px); box-shadow: 0 2px 10px rgba(15,23,42,0.06); }
        .progress-subbar .vol-icon {
            width: 14px; height: 14px; display: inline-flex; align-items: center; justify-content: center;
            flex: 0 0 14px; color: currentColor;
        }
        .progress-subbar .vol-icon svg { width: 14px; height: 14px; display: block; }
        .progress-subbar .vol-label { font-weight: 600; }
        .progress-subbar .vol-count { opacity: .85; font-weight: 600; }
        .progress-subbar .vol-block[data-vol="上冊"] { color: #4f46e5; border-color: #c7d2fe; }
        .progress-subbar .vol-block[data-vol="中冊"] { color: #0f766e; border-color: #5eead4; }
        .progress-subbar .vol-block[data-vol="下冊"] { color: #d97706; border-color: #fdba74; }
        .progress-subbar .vol-text { opacity: 0.82; font-weight: 600; }
        .progress-subbar .sep-dot { display: none; }

        #volModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:9000; align-items:center; justify-content:center; }
        #volModal.show { display:flex; }
        #volModalBox { background:#fff; border-radius:10px; padding:20px 24px; width:520px; max-height:80vh; overflow-y:auto; box-shadow:0 8px 32px rgba(0,0,0,.18); }
        #volModalTitle { font-size:16px; font-weight:700; margin-bottom:14px; display:flex; align-items:center; justify-content:space-between; }
        .vol-modal-row {
            display:grid; grid-template-columns:1fr auto; align-items:center; gap:8px; padding:8px 10px;
            border-bottom:1px solid #f1f5f9; font-size:13px; border-radius:8px; cursor:pointer;
            transition: background .15s, box-shadow .15s;
        }
        .vol-modal-row:hover { background:#f8fafc; }
        .vol-modal-row.current { background:#eef2ff; box-shadow: inset 0 0 0 1px rgba(79,70,229,0.18); }
        .vol-modal-name {
            border:none; background:transparent; text-align:left; cursor:pointer; padding:0;
            font-size:13px; font-family:inherit; color:inherit;
        }
        .vol-modal-name:hover { text-decoration: underline; }

        /* Main layout */
        .main {
            display: flex;
            margin-top: calc(var(--toolbar-h) + var(--subbar-h));
            height: calc(100vh - var(--toolbar-h) - var(--subbar-h));
            overflow: hidden;
            padding: 18px 24px;
            box-sizing: border-box;
            background: #fafafa;
        }

        body.nav-collapsed .nav-panel { width: 42px; }
        body.nav-collapsed .nav-item { padding: 10px 8px; font-size: 0; text-align: center; }
        body.nav-collapsed .nav-item .nav-icon { margin-right: 0; }

        /* Left: Section navigation */
        .nav-panel {
            width: 210px; background: white; border-right: 1px solid #e0e0e0;
            overflow-y: auto; transition: width 0.2s; position: relative;
        }
        body.full-summary-layout .nav-panel,
        body.full-summary-layout #resizerLeft { display: none; }
        .nav-panel-body { padding: 8px 0 18px; }
        .panel-head {
            min-height: 48px; padding: 10px 16px; border-bottom: 1px solid #f3f4f6; background: #fafafa;
            display: flex; flex-direction: column; justify-content: center;
        }
        .panel-kicker { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; color: #8b5cf6; margin-bottom: 4px; }
        .panel-title { font-size: 15px; font-weight: 600; color: #111827; }
        .panel-meta { font-size: 12px; color: #6b7280; margin-top: 4px; }
        .panel-title-row {
            display: flex; align-items: center; gap: 10px;
        }
        .panel-title-icon {
            width: 28px; height: 28px; border-radius: 9px;
            display: inline-flex; align-items: center; justify-content: center;
            flex: 0 0 28px;
        }
        .panel-title-icon.ai {
            background: linear-gradient(135deg, #ede9fe 0%, #ddd6fe 55%, #fde68a 100%);
            box-shadow: inset 0 0 0 1px rgba(139, 92, 246, 0.12);
        }
        .panel-title-icon.ai svg {
            width: 16px; height: 16px; display: block;
        }

        .nav-item {
            padding: 10px 16px; cursor: pointer; font-size: 13px; color: #555;
            border-left: 3px solid transparent; transition: all 0.15s;
        }
        .nav-item:hover { background: #f5f5f5; }
        .nav-item.active { background: #eef2ff; color: #4f46e5; border-left-color: #4f46e5; font-weight: 500; }
        .nav-item .nav-icon { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; background: #d1d5db; }
        .nav-item.active .nav-icon { background: #4f46e5; }
        .nav-item.has-content .nav-icon { background: #10b981; }

        /* Middle: Content panel */
        .content-panel {
            flex: 1 1 auto; min-width: 0; min-height: 0; padding: 0; overflow: hidden; height: 100%;
            background: #fff; border: 1px solid #e5e7eb; border-radius: 12px;
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
        }
        body.full-summary-layout .content-panel { order: 3; flex: 0 0 calc((100% - 6px) / 2); }
        .single-panel { height: 100%; min-height: 0; display: flex; flex-direction: column; background: transparent; }
        .content-panel-body { padding: 16px 18px 40px; flex: 1; min-height: 0; overflow-y: auto; background: #fff; }
        .summary-shell {
            max-width: 760px;
            margin: 0 auto;
        }
        body.full-summary-layout .summary-shell { max-width: none; }
        .summary-section-block {
            padding: 0;
            background: transparent;
            border: none;
            border-radius: 0;
            box-shadow: none;
        }
        .summary-section-block + .summary-section-block .section-title {
            margin-top: 24px;
        }
        body.full-summary-layout #resizerRight { order: 2; }

        .section-title {
            font-size: 15px; font-weight: 600; color: #333;
            margin-bottom: 14px; padding-bottom: 10px;
        }
        .section-title-ai { border-bottom: 2px solid #ede9fe; }
        .section-content {
            font-size: 14px; line-height: 1.85; color: #333; white-space: pre-wrap;
        }

        /* Citation tags in content — now purple themed */
        .section-content .citation {
            display: inline; background: #ede9fe; color: #6d28d9;
            padding: 1px 6px; border-radius: 3px; font-size: 12px; font-weight: 500;
            cursor: pointer; transition: all 0.15s; margin: 0 2px;
        }
        .section-content .citation:hover { background: #ddd6fe; }
        .section-content .citation.active {
            background: #fef9c3; color: #92400e;
            box-shadow: 0 0 0 2px #eab308;
        }

        .empty-content { color: #9ca3af; font-style: italic; padding: 40px; text-align: center; }

        /* ─── RIGHT: Source panel (replaces old citation cards) ─── */
        .source-panel {
            width: 360px; background: white; border: 1px solid #e5e7eb; border-radius: 12px;
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
            display: flex; flex-direction: column; transition: width 0.2s; position: relative; height: 100%; min-height: 0;
        }
        body.full-summary-layout .source-panel {
            order: 1;
            flex: 0 0 calc((100% - 6px) / 2);
            width: auto;
            border: 1px solid #e5e7eb;
        }

        .source-panel-header {
            min-height: 48px; padding: 10px 16px; border-bottom: 1px solid #f3f4f6;
            font-size: 13px; font-weight: 600; color: #555; background: #fafafa;
            display: flex; align-items: center; gap: 8px;
        }
        .source-panel-header .icon {
            font-size: 14px; width: 24px; height: 24px; border-radius: 5px;
            background: #f5f5f4; display: flex; align-items: center; justify-content: center;
        }
        .source-panel-header .chunk-count {
            font-size: 11px; color: #9ca3af; font-weight: 400; margin-left: auto;
        }
        .mobile-sheet-close {
            display: none;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border: 1px solid #e2e8f0;
            border-radius: 999px;
            background: #fff;
            color: #64748b;
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
            margin-left: 8px;
        }

        .source-list {
            flex: 1; min-height: 0; overflow-y: auto; padding: 14px 18px 40px;
            font-size: 14px; line-height: 1.85; color: #475569;
            white-space: pre-wrap; word-break: break-all;
        }

        /* Chunk regions — invisible boundaries, marker pen on activate */
        .chunk-region {
            border-radius: 2px;
            transition: all 0.3s;
        }
        .chunk-region mark {
            background: transparent; color: inherit;
            padding: 1px 0; border-radius: 2px;
            box-decoration-break: clone; -webkit-box-decoration-break: clone;
            transition: background 0.3s;
        }
        .chunk-region.active mark {
            background: #fef9c3;
        }
        .chunk-region.active {
            border-left: 3px solid #eab308;
            padding-left: 12px;
            margin-left: -15px;
        }
        .chunk-label {
            display: none; font-size: 9px; font-weight: 700;
            color: #d97706; background: #fef3c7;
            padding: 1px 5px; border-radius: 3px;
            vertical-align: middle; margin-right: 3px;
        }
        .chunk-region.active .chunk-label { display: inline; }

        body.source-collapsed .source-panel { width: 42px; }
        body.source-collapsed .source-panel-header,
        body.source-collapsed .source-list { display: none; }

        /* Resizer dividers */
        .resizer {
            width: 6px; cursor: col-resize; background: transparent;
            flex-shrink: 0; position: relative; z-index: 5;
        }
        .resizer::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 2px; height: 40px; background: #cbd5e1; border-radius: 2px;
            transition: background 0.2s, height 0.2s;
        }
        .resizer:hover::after, .resizer.active::after {
            background: #4f46e5; height: 60px;
        }
        body.nav-collapsed #resizerLeft { display: none; }
        body.source-collapsed #resizerRight { display: none; }

        /* Scrollbar */
        .source-list::-webkit-scrollbar { width: 5px; }
        .source-list::-webkit-scrollbar-track { background: transparent; }
        .source-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

        /* Loading */
        .loading { display: flex; align-items: center; justify-content: center; height: 100%; color: #999; }
        .loading::after {
            content: ''; width: 24px; height: 24px;
            border: 2px solid #e0e0e0; border-top-color: #4f46e5;
            border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── MOBILE ─── */
        .drawer-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.35); z-index: 150; opacity: 0; transition: opacity 0.25s;
        }
        .drawer-overlay.visible { opacity: 1; }

        @media (max-width: 1024px) {
            .toolbar { padding: 0 12px; gap: 8px; }
            .toolbar h1 { font-size: 15px; }
            .toolbar .condition-select { min-width: 140px; font-size: 13px; }
            .toolbar .condition-label { font-size: 13px; }
            .nav-panel { width: 190px; }
            .source-panel { width: 300px; }
        }

        @media (max-width: 768px) {
            .resizer { display: none; }

            /* ─── Mobile toolbar: fixed 50px, no wrap ─── */
            :root { --toolbar-h: 50px; }
            .toolbar {
                height: var(--toolbar-h); overflow: visible; flex-wrap: nowrap;
                justify-content: space-between; padding: 0 12px; gap: 8px;
            }
            .toolbar h1 { font-size: 15px; flex-shrink: 0; }
            .mobile-case-badge {
                display: flex; align-items: center; gap: 6px;
                font-size: 12px; font-weight: 600; color: #4f46e5;
                background: #eef2ff; padding: 4px 10px; border-radius: 20px;
                white-space: nowrap; cursor: pointer; flex-shrink: 1;
                min-width: 0; overflow: hidden; text-overflow: ellipsis;
                max-width: 52vw;
            }
            .mobile-menu-btn {
                display: flex; align-items: center; justify-content: center;
                width: 36px; height: 36px; border: 1px solid #cbd5e1;
                border-radius: 8px; background: white; font-size: 20px;
                cursor: pointer; color: #334155; flex-shrink: 0;
            }

            .mobile-backdrop {
                display: none; position: fixed; top: var(--toolbar-h); left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.25); z-index: 98;
            }
            .mobile-backdrop.open { display: block; }

            /* ─── Expandable drawer ─── */
            .toolbar-controls {
                display: none !important; position: absolute; top: var(--toolbar-h); left: 0; right: 0;
                background: white; padding: 16px; flex-direction: column; gap: 14px;
                box-shadow: 0 8px 24px rgba(0,0,0,0.12); border-radius: 0 0 12px 12px; z-index: 99;
            }
            .toolbar-controls.open { display: flex !important; }

            .ctrl-label { display: block; font-size: 12px; font-weight: 600; color: #64748b; margin-bottom: 4px; }
            .ctrl-row { display: flex; flex-direction: column; }
            .ctrl-row select { width: 100%; font-size: 15px; padding: 10px 12px; }
            .ctrl-row-half { display: flex; flex-direction: row; gap: 12px; }
            .ctrl-row-half > div { flex: 1; display: flex; flex-direction: column; }
            .ctrl-row-half select { width: 100%; font-size: 15px; padding: 10px 12px; }
            .ctrl-row-nav {
                display: flex; flex-direction: column; gap: 8px;
                padding-top: 8px; border-top: 1px solid #f1f5f9;
            }
            .ctrl-row-nav a {
                display: flex; align-items: center; justify-content: center;
                padding: 10px 12px; border-radius: 10px; border: 1px solid #e2e8f0;
                background: #fff; color: #475569 !important; font-size: 14px !important;
                font-weight: 500; text-decoration: none !important;
            }
            .ctrl-row-nav a.active {
                background: #4f46e5; border-color: #4f46e5; color: #fff !important;
                box-shadow: none;
            }

            .toolbar .spacer { display: none; }
            .toolbar .condition-label { display: none; }

            /* ─── Main layout ─── */
            .progress-subbar { top: var(--toolbar-h); }
            .main { flex-direction: column; margin-top: calc(var(--toolbar-h) + var(--subbar-h)); height: auto; min-height: calc(100vh - var(--toolbar-h) - var(--subbar-h)); margin-bottom: 0 !important; }
            .main { padding: 0; }

            .nav-panel {
                position: fixed; top: 0; left: 0; bottom: 0; width: 260px; z-index: 200;
                transform: translateX(-100%); transition: transform 0.3s ease;
                padding-top: 12px; box-shadow: 4px 0 20px rgba(0,0,0,0.15);
            }
            body.mobile-full-mode .nav-panel { display: none; }
            body.mobile-full-mode #singlePanel > .panel-head { display: none; }
            body.mobile-full-mode .summary-section-block + .summary-section-block {
                padding-top: 18px;
                margin-top: 18px;
                border-top: 1px solid #e5e7eb;
            }
            body.mobile-full-mode .summary-section-block .section-title {
                font-size: 15px;
                margin-bottom: 10px;
                padding-bottom: 8px;
                border-bottom: 1px solid #ddd6fe;
                color: #312e81;
            }
            body.nav-open .nav-panel { transform: translateX(0); }
            body.nav-collapsed .nav-panel { width: 260px; }
            body.nav-collapsed .nav-item { font-size: 13px; padding: 10px 16px; text-align: left; }
            body.nav-collapsed .nav-item .nav-icon { margin-right: 8px; }

            .source-panel {
                position: fixed; left: 0; right: 0; bottom: 0;
                width: auto; max-width: none; min-height: 0; max-height: 76vh;
                z-index: 200; transform: translateY(calc(100% + 24px)); transition: transform 0.28s ease;
                box-shadow: 0 -18px 40px rgba(15,23,42,0.18);
                border-radius: 18px 18px 0 0; border-left: none; border-right: none; border-bottom: none;
                pointer-events: none;
            }
            body.source-open .source-panel,
            .source-panel.mobile-open { transform: translateY(0); pointer-events: auto; }
            body.source-collapsed .source-panel { width: auto; }
            body.source-collapsed .source-panel-header,
            body.source-collapsed .source-list { display: block; }
            .source-panel-header {
                padding: 16px 16px 10px 16px;
                min-height: 0;
                position: relative;
            }
            .source-panel-header::before {
                content: '';
                width: 42px;
                height: 4px;
                border-radius: 999px;
                background: #cbd5e1;
                position: absolute;
                top: 8px;
                left: 50%;
                transform: translateX(-50%);
            }
            .source-panel-header .chunk-count { padding-right: 4px; }
            .mobile-sheet-close { display: inline-flex; }
            .source-list { padding-bottom: 28px; }

            .content-panel { flex: 1; padding: 16px; overflow-y: auto; border: none; border-radius: 0; box-shadow: none; background: transparent; }
            .summary-shell { max-width: none; }
            .section-title { font-size: 16px; margin-bottom: 12px; }
            .section-content { font-size: 14px; line-height: 1.7; }

            .mobile-fab {
                display: flex; position: fixed; bottom: 16px;
                width: 44px; height: 44px; border-radius: 50%;
                background: #4f46e5; color: #fff; border: none; font-size: 18px;
                align-items: center; justify-content: center;
                box-shadow: 0 4px 14px rgba(79,70,229,0.4);
                z-index: 120; cursor: pointer; transition: transform 0.2s;
            }
            .mobile-fab:active { transform: scale(0.92); }
            .mobile-fab.fab-nav { left: 16px; }
            .mobile-fab.fab-cite { right: 16px; }
            body.mobile-full-mode .mobile-fab.fab-nav { display: none; }
        }

        @media (min-width: 769px) {
            html, body {
                height: 100%;
                overflow: hidden;
            }
            .mobile-fab { display: none !important; }
            .drawer-overlay { display: none !important; }
            .mobile-backdrop { display: none !important; }
        }

        @media (max-width: 480px) {
            .mobile-case-badge { max-width: 50vw; font-size: 11px; }
            .toolbar h1 { font-size: 13px; }
            .content-panel { padding: 12px 10px; }
            .summary-shell { max-width: none; }
            .section-content { font-size: 13px; line-height: 1.65; }
            .nav-panel { width: 240px; }
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <h1>摘要檢視</h1>
        <span class="mobile-case-badge" id="mobileCaseBadge" onclick="toggleMobileDrawer()">選擇案件</span>
        <button class="mobile-menu-btn" id="mobileMenuBtn" onclick="toggleMobileDrawer()">&#9776;</button>
        <div class="toolbar-controls" id="toolbarControls">
            <div class="ctrl-row">
                <label class="ctrl-label">案件</label>
                <select class="condition-select" id="caseSelect"></select>
            </div>
            <div class="ctrl-row-half">
                <div>
                    <label class="ctrl-label">群組</label>
                    <select class="mode-select" id="groupSelect">
                        <option value="all">All</option>
                        <option value="商用模型">商用模型</option>
                        <option value="開源模型">開源模型</option>
                    </select>
                </div>
                <div>
                    <span class="condition-label">版本</span>
                    <label class="ctrl-label">版本</label>
                    <select class="condition-select" id="conditionSelect"></select>
                </div>
            </div>
            <span class="spacer"></span>
                <div class="ctrl-row-nav">
                <a id="viewNavLink" class="nav-link active" href="view.html">摘要檢視</a>
                <a id="timelineLink" class="nav-link" href="timeline.html">時間軸檢視</a>
                <a class="nav-link" href="metrics.html">AI 評估指標</a>
                <a class="nav-link" href="metrics-guide.html">指標說明</a>
                <a id="evalLink" class="nav-link" href="eval.html">專家評估</a>
                <a class="nav-link" href="index.html">首頁</a>

    <script src="versioning.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const initialCaseName = urlParams.get('case') || '';
        const initialCondition = urlParams.get('condition') || 'claude_afg_v5.1';
        const initialGroup = ['all', '商用模型', '開源模型'].includes(urlParams.get('group'))
            ? urlParams.get('group') : '商用模型';

        let viewData = null;
        let allCases = [];
        let caseSlugs = {};
        let caseInfo = {};
        let caseVolumes = {};
        let currentCaseName = initialCaseName;
        let currentCondition = initialCondition;
        let currentGroup = initialGroup;
        let currentSection = null;
        let activeChunkAlias = null;
        const VIEW_DISPLAY_LABELS = {
            'claude_afg_v5.1': 'LENS-Haiku 4.5-A',
            'ablation_no_afg': 'LENS-Haiku 4.5-B',
            'ablation_no_react': 'LENS-Haiku 4.5-C',
            'LENS-Full-DeepSeek_v31': 'LENS-DeepSeek v3.1-A',
            'LENS-NoAFG-DeepSeek_v31': 'LENS-DeepSeek v3.1-B',
            'LENS-NoReact-DeepSeek_v31': 'LENS-DeepSeek v3.1-C',
        };
        const CONDITION_PRIORITY = {
            'claude_afg_v5.1': 10,
            'ablation_no_afg': 11,
            'ablation_no_react': 12,
            'baseline_claude-haiku': 20,
            'baseline_claude-sonnet': 21,
            'baseline_gemini-3.0-flash': 22,
            'baseline_gemini-3.1-pro': 23,
            'baseline_gpt-5.3': 24,
            'baseline_gpt-5.4-thinking': 25,
            'LENS-Full-DeepSeek_v31': 30,
            'LENS-NoAFG-DeepSeek_v31': 31,
            'LENS-NoReact-DeepSeek_v31': 32,
        };

        function displayConditionLabel(cond, labels = {}) {
            return VIEW_DISPLAY_LABELS[cond] || labels[cond] || cond;
        }

        function sortConditions(conditions, labels = {}) {
            return [...conditions].sort((a, b) => {
                const pa = CONDITION_PRIORITY[a] ?? 1000;
                const pb = CONDITION_PRIORITY[b] ?? 1000;
                if (pa !== pb) return pa - pb;
                return displayConditionLabel(a, labels).localeCompare(displayConditionLabel(b, labels), 'zh-Hant');
            });
        }

        function getSlug(caseName) { return caseSlugs[caseName] || encodeURIComponent(caseName); }

        async function loadCaseList() {
            try {
                await loadSiteVersion();
                const manifest = await (await fetch('./data/manifest.json')).json();
                allCases = manifest.cases || [];
                caseSlugs = manifest.case_slugs || {};
                caseInfo = manifest.case_info || {};
                caseVolumes = manifest.case_volumes || {};
            } catch { allCases = currentCaseName ? [currentCaseName] : []; }
            if (!currentCaseName && allCases.length > 0) currentCaseName = allCases[0];
            updateVolumeProgress();
            renderCaseSelector();
        }

        function getCaseDisplay(name) {
            const info = caseInfo[name] || {};
            return info.display || name;
        }

        function renderCaseSelector() {
            const select = document.getElementById('caseSelect');
            const volumes = ['上冊', '中冊', '下冊'];
            const byVol = {};
            volumes.forEach(v => { byVol[v] = []; });
            allCases.forEach(name => {
                const vol = (caseInfo[name] || {}).volume || caseVolumes[name] || '';
                if (byVol[vol]) byVol[vol].push(name);
                else { byVol[vol] = byVol[vol] || []; byVol[vol].push(name); }
            });
            let html = '';
            volumes.forEach(vol => {
                if (!byVol[vol] || !byVol[vol].length) return;
                html += `<optgroup label="${escapeHtml(vol)}">`;
                byVol[vol].forEach(name => {
                    const sel = name === currentCaseName ? 'selected' : '';
                    html += `<option value="${escapeHtml(name)}" ${sel}>${escapeHtml(getCaseDisplay(name))}</option>`;
                });
                html += '</optgroup>';
            });
            select.innerHTML = html;
            updateMobileCaseBadge();
            if (!select.dataset.bound) {
                select.addEventListener('change', async () => {
                    currentCaseName = select.value; currentSection = null;
                    closeMobileDrawer();
                    await loadData();
                });
                select.dataset.bound = '1';
            }
        }

        function updateVolumeProgress() {
            const volumes = ['上冊', '中冊', '下冊'];
            const currentVolume = currentCaseName ? ((caseInfo[currentCaseName] || {}).volume || caseVolumes[currentCaseName] || '') : '';
            volumes.forEach((vol, idx) => {
                const total = allCases.filter(name => ((caseInfo[name] || {}).volume || caseVolumes[name] || '') === vol).length;
                const textEl = document.getElementById(`volText${idx}`);
                const btnEl = document.getElementById(`volBtn${idx}`);
                if (textEl) textEl.textContent = `${total}案`;
                if (btnEl) btnEl.style.boxShadow = '';
            });
        }

        function openVolModal(volName) {
            const cases = allCases.filter(name => ((caseInfo[name] || {}).volume || caseVolumes[name] || '') === volName);
            document.getElementById('volModalLabel').textContent = `${volName}（${cases.length} 案）`;
            document.getElementById('volModalList').innerHTML = cases.map(name => {
                const rowCls = name === currentCaseName ? 'vol-modal-row current' : 'vol-modal-row';
                return `<div class="${rowCls}" onclick='jumpToCaseFromVolModal(${JSON.stringify(name)})'>
                    <button class="vol-modal-name" onclick='event.stopPropagation();jumpToCaseFromVolModal(${JSON.stringify(name)})'>${escapeHtml(getCaseDisplay(name))}</button>
                    <span style="font-size:12px;color:#94a3b8;">切換</span>
                </div>`;
            }).join('');
            document.getElementById('volModal').classList.add('show');
        }

        function closeVolModal() {
            document.getElementById('volModal').classList.remove('show');
        }

        async function jumpToCaseFromVolModal(caseName) {
            closeVolModal();
            if (!caseName || caseName === currentCaseName) return;
            currentCaseName = caseName;
            currentSection = null;
            renderCaseSelector();
            await loadData();
        }

        async function loadData() {
            if (!currentCaseName) { alert('未指定案件名稱'); return; }
            renderCaseSelector();
            try {
                const response = await fetch(`./data/${encodeURIComponent(currentCondition)}/${getSlug(currentCaseName)}.json`);
                if (!response.ok) throw new Error('載入生成摘要失敗');
                viewData = await response.json();
                currentCondition = viewData.condition || currentCondition;

                const groups = viewData.condition_groups || {};
                const available = viewData.available_conditions || [];
                const groupOptions = sortConditions(
                    available.filter((cond) => currentGroup === 'all' || groups[cond] === currentGroup),
                    viewData.condition_labels || {}
                );
                if (groupOptions.length > 0 && !groupOptions.includes(currentCondition)) {
                    currentCondition = groupOptions[0]; await loadData(); return;
                }
                updateMobileCaseBadge();
                renderConditionSelector();
                renderGroupSelector();
                renderSourcePanel();
                updateUrlState();

                const firstSection = viewData.sections.find((s) => s.content) || viewData.sections[0];
                if (firstSection) selectSection(firstSection.id);
            } catch (err) {
                document.getElementById('contentPanelBody').innerHTML = `<div class="empty-content">載入失敗: ${escapeHtml(err.message || '未知錯誤')}</div>`;
            }
        }

        function isMobileSummaryLayout() {
            return window.innerWidth <= 768;
        }

        function formatMobileCaseBadge() {
            const info = caseInfo[currentCaseName] || {};
            const volume = info.volume || caseVolumes[currentCaseName] || '';
            const display = getCaseDisplay(currentCaseName) || '選擇案件';
            const iconMap = { '上冊': '📘', '中冊': '📗', '下冊': '📙' };
            const compact = display.replace(/^[上中下]-/, '').replace(/・/g, '‧');
            return {
                icon: iconMap[volume] || '📘',
                text: compact
            };
        }

        function syncMobileSummaryMode() {
            document.body.classList.toggle('mobile-full-mode', isMobileSummaryLayout());
        }

        function syncDesktopSummaryLayout() {
            const enabled = !isMobileSummaryLayout();
            document.body.classList.toggle('full-summary-layout', enabled);
            if (!enabled) return;
            const useSavedWidths = !!localStorage.getItem('viewPanelWidths_full_summary');
            ['contentPanel', 'sourcePanel'].forEach((id) => {
                const el = document.getElementById(id);
                if (!el) return;
                if (!useSavedWidths) {
                    el.style.width = '';
                    el.style.flex = '';
                }
            });
            try {
                localStorage.removeItem('viewPanelWidths');
            } catch {}
        }

        function renderNav() {
            const navList = document.getElementById('navList');
            const navMeta = document.getElementById('navMeta');
            navMeta.textContent = `${viewData.sections.filter((section) => section.content).length} / ${viewData.sections.length} 章節可讀`;
            navList.innerHTML = viewData.sections.map((section) => `
                    <div class="nav-item ${section.content ? 'has-content' : ''}"
                         data-section="${section.id}"
                         onclick="window.selectSection('${section.id}')">
                        <span class="nav-icon"></span>
                        ${section.title}
                    </div>
                `).join('');
        }

        function renderConditionSelector() {
            const select = document.getElementById('conditionSelect');
            const available = viewData.available_conditions || [];
            const labels = viewData.condition_labels || {};
            const groups = viewData.condition_groups || {};
            const filtered = sortConditions(
                available.filter((cond) => currentGroup === 'all' || groups[cond] === currentGroup),
                labels
            );
            const options = filtered.length > 0 ? filtered : available;
            if (!options.includes(currentCondition) && options.length > 0) currentCondition = options[0];
            select.innerHTML = options.map((cond) => {
                const label = displayConditionLabel(cond, labels);
                const selected = cond === currentCondition ? 'selected' : '';
                return `<option value="${escapeHtml(cond)}" ${selected}>${escapeHtml(label)}</option>`;
            }).join('');
            select.disabled = options.length <= 1;
            if (!select.dataset.bound) {
                select.addEventListener('change', async () => { currentCondition = select.value; await loadData(); });
                select.dataset.bound = '1';
            }
        }

        function renderGroupSelector() {
            const select = document.getElementById('groupSelect');
            select.value = currentGroup;
            if (!select.dataset.bound) {
                select.addEventListener('change', async () => {
                    currentGroup = select.value;
                    const before = currentCondition;
                    renderConditionSelector(); updateUrlState();
                    if (currentCondition !== before) { await loadData(); return; }
                    if (currentSection) selectSection(currentSection);
                });
                select.dataset.bound = '1';
            }
        }

        // ─── SOURCE PANEL: Full text with chunk regions ───

        function renderSourcePanel() {
            const listEl = document.getElementById('sourceList');
            const countEl = document.getElementById('sourceChunkCount');
            const chunks = viewData.chunks || {};
            const aliases = Object.keys(chunks).sort((a, b) =>
                parseInt(a.replace('CH_', ''), 10) - parseInt(b.replace('CH_', ''), 10)
            );

            const totalChars = aliases.reduce((sum, alias) => sum + (chunks[alias] || '').length, 0);
            countEl.textContent = totalChars > 0 ? `${totalChars.toLocaleString()} 字` : '';
            if (aliases.length === 0) {
                listEl.innerHTML = '<div class="empty-content">無原文資料</div>';
                return;
            }

            listEl.innerHTML = aliases.map(alias => {
                const content = sanitizeSourceText(chunks[alias] || '');
                return `<div class="chunk-region" id="src_${alias}" data-alias="${alias}">` +
                    `<span class="chunk-label">${alias}</span>` +
                    `<mark>${escapeHtml(content)}</mark>` +
                    `</div>`;
            }).join('');
        }

        // ─── SECTION RENDERING ───

        function selectSection(sectionId) {
            currentSection = sectionId;
            activeChunkAlias = null;
            renderFullSummaryContent();
            document.querySelectorAll('.nav-item').forEach((item) => {
                item.classList.toggle('active', item.dataset.section === sectionId);
            });
            document.querySelectorAll('.chunk-region.active').forEach(el => el.classList.remove('active'));
        }

        function renderSingleContent(section) {
            const singlePanel = document.getElementById('contentPanelBody');
            if (!section.content) {
                singlePanel.innerHTML = `<div class="summary-shell"><div class="section-title section-title-ai">${section.title}</div><div class="empty-content">本章節無內容</div></div>`;
                return;
            }
            singlePanel.innerHTML = `<div class="summary-shell"><div class="section-title section-title-ai">${section.title}</div><div class="section-content">${withCitationMarkup(section.content)}</div></div>`;
        }

        function renderFullSummaryContent() {
            const singlePanel = document.getElementById('contentPanelBody');
            const parts = (viewData.sections || [])
                .filter((section) => section.content)
                .map((section) => (
                    `<section class="summary-section-block">` +
                    `<div class="section-title section-title-ai">${escapeHtml(section.title)}</div>` +
                    `<div class="section-content">${withCitationMarkup(sanitizeSummaryText(section.content))}</div>` +
                    `</section>`
                ));
            if (!parts.length) {
                singlePanel.innerHTML = '<div class="summary-shell"><div class="empty-content">目前無可顯示摘要</div></div>';
                return;
            }
            singlePanel.innerHTML = `<div class="summary-shell">${parts.join('')}</div>`;
            // Update word count + compression ratio
            const metaEl = document.getElementById('summaryMeta');
            if (metaEl) {
                const summaryChars = (viewData.sections || []).reduce((sum, s) =>
                    sum + (s.content || '').replace(/\[CH_\d+(?:,\s*CH_\d+)*\]/g, '').length, 0);
                const chunks = viewData.chunks || {};
                const sourceChars = Object.values(chunks).reduce((sum, c) => sum + (c || '').length, 0);
                const ratio = sourceChars > 0 ? ((1 - summaryChars / sourceChars) * 100).toFixed(0) : 0;
                metaEl.textContent = summaryChars > 0 ? `${summaryChars.toLocaleString()} 字（▼${ratio}%）` : '';
            }
        }

        // Normalize CH_1 → CH_01 (pad to 2 digits to match chunk keys)
        function normAlias(a) {
            return a.replace(/CH_(\d+)/, (_, n) => 'CH_' + n.padStart(2, '0'));
        }

        function withCitationMarkup(content) {
            return escapeHtml(content).replace(/\[CH_\d+(?:,\s*CH_\d+)*\]/g, (match) => {
                const aliases = match.match(/CH_\d+/g) || [];
                const normalized = aliases.map(normAlias);
                return `<span class="citation" data-aliases="${normalized.join(',')}" onclick="highlightCitation(this)">${match}</span>`;
            });
        }

        function sanitizeSummaryText(content) {
            return String(content || '')
                .replace(/\n?\s*\[Image of[^\]]*\]\s*\n?/gi, '\n')
                .replace(/\n{3,}/g, '\n\n')
                .trim();
        }

        function sanitizeSourceText(content) {
            return String(content || '')
                .replace(/\n{3,}/g, '\n\n')
                .trim();
        }

        // ─── HIGHLIGHT: Click citation → scroll + marker pen in source panel ───

        function highlightCitation(element) {
            const aliases = element.dataset.aliases.split(',');

            // Clear previous
            document.querySelectorAll('.citation.active').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.chunk-region.active').forEach(el => el.classList.remove('active'));

            // Toggle off if same
            if (aliases.length === 1 && activeChunkAlias === aliases[0]) {
                activeChunkAlias = null;
                return;
            }

            element.classList.add('active');
            activeChunkAlias = aliases[0];

            if (window.innerWidth <= 768) {
                openMobileSource();
            }

            // Highlight + scroll in source panel
            const scrollToChunks = () => {
                aliases.forEach(alias => {
                    const srcEl = document.getElementById(`src_${alias}`);
                    if (srcEl) {
                        srcEl.classList.add('active');
                        srcEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                });
            };
            if (window.innerWidth <= 768) {
                requestAnimationFrame(() => setTimeout(scrollToChunks, 120));
            } else {
                scrollToChunks();
            }
        }

        // ─── PANEL TOGGLES ───

        function updateUrlState() {
            const url = new URL(window.location.href);
            url.searchParams.set('case', currentCaseName);
            url.searchParams.set('condition', currentCondition);
            url.searchParams.set('group', currentGroup);
            window.history.replaceState({}, '', url.toString());

            const enc = encodeURIComponent(currentCaseName);
            const tlLink = document.getElementById('timelineLink');
            if (tlLink && currentCaseName) tlLink.href = versionedHref(`timeline.html?case=${enc}&source=v310`);
            const evLink = document.getElementById('evalLink');
            if (evLink && currentCaseName) evLink.href = versionedHref(`eval.html?case=${enc}`);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text == null ? '' : String(text);
            return div.innerHTML;
        }

        // ─── Mobile Toolbar Drawer ───
        function toggleMobileDrawer() {
            const controls = document.getElementById('toolbarControls');
            const backdrop = document.getElementById('mobileBackdrop');
            if (controls.classList.contains('open')) {
                closeMobileDrawer();
            } else {
                controls.classList.add('open');
                backdrop.classList.add('open');
            }
        }
        function closeMobileDrawer() {
            document.getElementById('toolbarControls').classList.remove('open');
            document.getElementById('mobileBackdrop').classList.remove('open');
        }
        function updateMobileCaseBadge() {
            const badge = document.getElementById('mobileCaseBadge');
            if (!badge) return;
            if (!currentCaseName) {
                badge.textContent = '選擇案件';
                return;
            }
            const { icon, text } = formatMobileCaseBadge();
            badge.innerHTML = `<span class="case-badge-icon" aria-hidden="true">${icon}</span><span class="case-badge-text">${escapeHtml(text)}</span>`;
        }

        // ─── Mobile Nav/Source Drawer Logic ───
        function toggleMobileNav() {
            const isOpen = document.body.classList.toggle('nav-open');
            document.body.classList.remove('source-open');
            showOverlay(isOpen);
        }
        function toggleMobileSource() {
            if (document.body.classList.contains('source-open')) closeMobileSource();
            else openMobileSource();
        }
        function openMobileSource() {
            document.body.classList.add('source-open');
            document.body.classList.remove('nav-open');
            const panel = document.getElementById('sourcePanel');
            if (panel) panel.classList.add('mobile-open');
            showOverlay(true);
        }
        function closeMobileSource() {
            document.body.classList.remove('source-open');
            const panel = document.getElementById('sourcePanel');
            if (panel) panel.classList.remove('mobile-open');
            showOverlay(false);
        }
        function closeAllDrawers() {
            document.body.classList.remove('nav-open');
            closeMobileSource();
            showOverlay(false);
        }
        function showOverlay(show) {
            const overlay = document.getElementById('drawerOverlay');
            if (show) { overlay.style.display = 'block'; requestAnimationFrame(() => overlay.classList.add('visible')); }
            else { overlay.classList.remove('visible'); setTimeout(() => { overlay.style.display = 'none'; }, 250); }
        }

        const origSelectSection = selectSection;
        function mobileAwareSelectSection(sectionId) {
            origSelectSection(sectionId);
            if (window.innerWidth <= 768) closeAllDrawers();
        }

        window.selectSection = mobileAwareSelectSection;
        window.highlightCitation = highlightCitation;
        window.toggleMobileNav = toggleMobileNav;
        window.toggleMobileSource = toggleMobileSource;
        window.openMobileSource = openMobileSource;
        window.closeMobileSource = closeMobileSource;
        window.closeAllDrawers = closeAllDrawers;
        window.toggleMobileDrawer = toggleMobileDrawer;
        window.closeMobileDrawer = closeMobileDrawer;

        // ─── Resizable panels ───
        function initResizers() {
            document.querySelectorAll('.resizer').forEach(resizer => {
                const onPointerDown = (startEvt) => {
                    startEvt.preventDefault();
                    const visualChildren = Array.from(resizer.parentElement.children)
                        .map((el, idx) => ({ el, idx, order: Number(getComputedStyle(el).order || 0) }))
                        .sort((a, b) => (a.order - b.order) || (a.idx - b.idx));
                    const visualIdx = visualChildren.findIndex((item) => item.el === resizer);
                    const leftEl = visualChildren[visualIdx - 1]?.el;
                    const rightEl = visualChildren[visualIdx + 1]?.el;
                    if (!leftEl || !rightEl) return;
                    const startX = startEvt.clientX ?? startEvt.touches[0].clientX;
                    const startLeftW = leftEl.offsetWidth;
                    const startRightW = rightEl.offsetWidth;
                    resizer.classList.add('active');
                    document.body.style.cursor = 'col-resize';
                    document.body.style.userSelect = 'none';

                    const onMove = (e) => {
                        const x = e.clientX ?? e.touches[0].clientX;
                        const dx = x - startX;
                        const newLeft = Math.max(60, startLeftW + dx);
                        const newRight = Math.max(60, startRightW - dx);
                        leftEl.style.width = newLeft + 'px';
                        leftEl.style.flex = 'none';
                        rightEl.style.width = newRight + 'px';
                        rightEl.style.flex = 'none';
                    };

                    const onUp = () => {
                        resizer.classList.remove('active');
                        document.body.style.cursor = '';
                        document.body.style.userSelect = '';
                        document.removeEventListener('mousemove', onMove);
                        document.removeEventListener('mouseup', onUp);
                        document.removeEventListener('touchmove', onMove);
                        document.removeEventListener('touchend', onUp);
                        try {
                            const widths = {};
                            document.querySelectorAll('.main > *:not(.resizer)').forEach(el => {
                                if (el.id) widths[el.id] = el.style.width;
                            });
                            const key = document.body.classList.contains('full-summary-layout')
                                ? 'viewPanelWidths_full_summary'
                                : 'viewPanelWidths';
                            localStorage.setItem(key, JSON.stringify(widths));
                        } catch {}
                    };

                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('mouseup', onUp);
                    document.addEventListener('touchmove', onMove, { passive: false });
                    document.addEventListener('touchend', onUp);
                };

                resizer.addEventListener('mousedown', onPointerDown);
                resizer.addEventListener('touchstart', onPointerDown, { passive: false });
            });

            try {
                const key = document.body.classList.contains('full-summary-layout')
                    ? 'viewPanelWidths_full_summary'
                    : 'viewPanelWidths';
                const saved = JSON.parse(localStorage.getItem(key));
                if (saved) {
                    Object.entries(saved).forEach(([id, w]) => {
                        const el = document.getElementById(id);
                        if (el && w) { el.style.width = w; el.style.flex = 'none'; }
                    });
                }
            } catch {}
        }

        // Init resizers
        document.addEventListener('DOMContentLoaded', () => {
            syncMobileSummaryMode();
            syncDesktopSummaryLayout();
            initResizers();
        });

        window.addEventListener('resize', () => {
            const wasMobile = document.body.classList.contains('mobile-full-mode');
            syncMobileSummaryMode();
            syncDesktopSummaryLayout();
            if (!viewData) return;
            const isMobile = isMobileSummaryLayout();
            if (isMobile) renderFullSummaryContent();
            else if (wasMobile && currentSection) {
                renderFullSummaryContent();
            }
        });

        (async () => { await loadCaseList(); await loadData(); })();
    </script>
</body>
</html>
