<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LENS Arena — 盲測比較</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --toolbar-h: 52px;
            --votebar-h: 52px;
            --subbar-h: 42px;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
        }

        /* ─── Toolbar ─── */
        .toolbar {
            position: fixed;
            top: 0; left: 0; right: 0; height: var(--toolbar-h);
            background: white; border-bottom: 1px solid #e0e0e0;
            display: flex; align-items: center;
            padding: 0 20px; gap: 12px; z-index: 100;
        }
        .toolbar h1 { font-size: 18px; font-weight: 700; color: #333; white-space: nowrap; }
        .toolbar .spacer { flex: 1; }

        .progress-badge {
            font-size: 13px; color: #6b7280; background: #f3f4f6;
            padding: 4px 12px; border-radius: 10px; font-weight: 500;
            white-space: nowrap;
        }

        .toolbar select {
            font-size: 14px; color: #374151; background: #f3f4f6;
            border: 1px solid #e5e7eb; border-radius: 12px;
            padding: 4px 10px; font-family: inherit;
        }

        .toolbar .eval-label {
            font-size: 13px; color: #6b7280; font-weight: 500;
        }

        .toolbar a.nav-link {
            color: #64748b; text-decoration: none; font-size: 13px; font-weight: 500;
            padding: 6px 12px; border-radius: 8px; transition: all 0.15s;
        }
        .toolbar a.nav-link:hover { background: #eef2ff; color: #4f46e5; }

        .toolbar .btn-sm {
            font-size: 12px; color: #64748b; background: #fff;
            border: 1px solid #cbd5e1; border-radius: 10px;
            padding: 7px 12px; cursor: pointer; font-family: inherit;
            transition: all 0.15s;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
        }
        .toolbar .btn-sm:hover { background: #f8fafc; color: #334155; border-color: #94a3b8; }
        .toolbar .btn-timeline {
            background: #fef9c3; color: #92400e; border-color: #fde68a;
        }
        .toolbar .btn-timeline:hover { background: #fde68a; }

        .progress-subbar {
            position: fixed;
            top: var(--toolbar-h);
            left: 0;
            right: 0;
            height: var(--subbar-h);
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 16px;
            z-index: 99;
            overflow-x: auto;
        }
        .case-pills, .pair-indicators {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .subbar-label {
            font-size: 12px;
            color: #64748b;
            font-weight: 600;
            white-space: nowrap;
        }
        .case-pill, .pair-pill {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 999px;
            border: 1px solid #cbd5e1;
            background: #fff;
            color: #64748b;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.15s;
        }
        .case-pill:hover, .pair-pill:hover {
            background: #f8fafc;
            border-color: #94a3b8;
        }
        .case-pill.active, .pair-pill.active {
            border-color: #4f46e5;
            background: #eef2ff;
            color: #4338ca;
        }
        .case-pill.done, .pair-pill.done {
            border-color: #a7f3d0;
            background: #ecfdf5;
            color: #047857;
        }
        .case-pill.partial, .pair-pill.partial {
            border-color: #fde68a;
            background: #fffbeb;
            color: #b45309;
        }
        .pair-pill.locked {
            opacity: 0.55;
            cursor: default;
        }

        /* ─── Main Area ─── */
        .main {
            position: fixed;
            top: calc(var(--toolbar-h) + var(--subbar-h));
            left: 0; right: 0;
            bottom: var(--votebar-h);
            display: flex; gap: 12px;
            padding: 16px 24px;
            background: #fafafa;
            overflow: hidden;
        }

        /* ─── Dual Panels ─── */
        .panel {
            flex: 1; min-width: 0;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        .panel-head {
            min-height: 44px; padding: 10px 16px;
            border-bottom: 1px solid #f3f4f6; background: #fafafa;
            display: flex; align-items: center; gap: 8px;
        }
        .panel-kicker {
            font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
        }
        .panel-title {
            font-size: 14px; font-weight: 600;
        }
        #panelA .panel-kicker, #panelA .panel-title { color: #4f46e5; }
        #panelB .panel-kicker, #panelB .panel-title { color: #ea580c; }
        .panel-meta {
            margin-left: auto; font-size: 12px; color: #9ca3af; font-weight: 400;
            white-space: nowrap;
        }
        .panel-meta .compress-pct {
            display: inline-block; background: #f0fdf4; color: #16a34a;
            padding: 1px 6px; border-radius: 4px; font-weight: 600; font-size: 11px;
            margin-left: 4px;
        }

        .panel-body {
            flex: 1; min-height: 0; overflow-y: auto;
            padding: 16px 18px 40px;
        }

        .section-block + .section-block { margin-top: 24px; }
        .section-title {
            font-size: 15px; font-weight: 600; color: #333;
            margin-bottom: 14px; padding-bottom: 10px;
            border-bottom: 2px solid #ede9fe;
        }
        .section-content {
            font-size: 14px; line-height: 1.85; color: #333;
            white-space: pre-wrap; word-break: break-word;
        }

        .section-content .citation {
            display: inline; background: #ede9fe; color: #6d28d9;
            padding: 1px 6px; border-radius: 3px; font-size: 12px;
            font-weight: 500; margin: 0 2px;
        }

        .empty-content {
            color: #9ca3af; font-style: italic; padding: 40px;
            text-align: center;
        }

        /* ─── Timeline Modal ─── */
        .tl-modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 9000;
            display: flex; align-items: center; justify-content: center;
        }
        .tl-modal-overlay.hidden { display: none; }
        .tl-modal-box {
            width: calc(100vw - 32px);
            height: calc(100vh - 32px);
            background: #fff; border-radius: 12px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.2);
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .tl-modal-header {
            display: flex; align-items: center; padding: 12px 20px;
            border-bottom: 1px solid #e5e7eb; background: #fafafa;
        }
        .tl-modal-header h3 {
            font-size: 15px; font-weight: 600; color: #333; flex: 1;
        }
        .tl-modal-close {
            width: 32px; height: 32px; border-radius: 8px;
            border: 1px solid #e2e8f0; background: #fff;
            font-size: 18px; color: #64748b; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .tl-modal-close:hover { background: #f3f4f6; color: #111; }
        .tl-modal-iframe {
            flex: 1; border: none; width: 100%;
        }

        /* ─── Vote Bar ─── */
        .vote-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: var(--votebar-h);
            background: white; border-top: 1px solid #e0e0e0;
            padding: 0 24px;
            display: flex; align-items: center; justify-content: center;
            gap: 10px; z-index: 100;
        }

        .vote-btn {
            padding: 7px 20px; border-radius: 8px;
            font-size: 13px; font-weight: 600; cursor: pointer;
            transition: all 0.15s; border: 1px solid #d1d5db;
            background: white; color: #374151;
            font-family: inherit;
        }
        .vote-btn:hover { border-color: #9ca3af; }
        .vote-a { color: #4f46e5; border-color: #c7d2fe; }
        .vote-a:hover { border-color: #4f46e5; background: #eef2ff; }
        .vote-b { color: #ea580c; border-color: #fed7aa; }
        .vote-b:hover { border-color: #ea580c; background: #fff7ed; }
        .vote-btn.selected-a { background: #4f46e5; color: white; border-color: #4f46e5; }
        .vote-btn.selected-b { background: #ea580c; color: white; border-color: #ea580c; }
        .vote-btn.selected-tie { background: #6b7280; color: white; border-color: #6b7280; }

        .vote-reason textarea {
            width: 220px; height: 32px; border: 1px solid #e5e7eb;
            border-radius: 8px; padding: 5px 10px; font-size: 12px;
            font-family: inherit; resize: none; color: #374151;
        }
        .vote-reason textarea:focus { outline: none; border-color: var(--primary); }

        .submit-btn {
            padding: 7px 18px; border-radius: 8px; border: none;
            background: var(--primary); color: white;
            font-size: 13px; font-weight: 600; cursor: pointer;
            font-family: inherit; transition: all 0.15s;
        }
        .submit-btn:hover { background: var(--primary-hover); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .case-label {
            font-size: 12px; color: #9ca3af;
        }

        .success-flash {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #10b981; color: white;
            padding: 16px 32px; border-radius: 12px;
            font-size: 16px; font-weight: 600;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            z-index: 9999; display: none;
            animation: flashIn 0.3s ease;
        }
        @keyframes flashIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        /* ─── Login Overlay ─── */
        .modal-overlay {
            position: fixed; inset: 0;
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.90), rgba(247, 244, 240, 0.86)),
                linear-gradient(180deg, rgba(255, 255, 255, 0.68), rgba(250, 248, 245, 0.82)),
                url('https://images.unsplash.com/photo-1484154218962-a197022b5858?auto=format&fit=crop&w=1800&q=80');
            background-size: cover;
            background-position: center center;
            z-index: 9000;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-overlay.hidden { display: none; }

        .modal-card {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.94) 0%, rgba(249, 247, 244, 0.96) 100%);
            border-radius: 18px;
            padding: 36px; width: 392px;
            box-shadow: 0 24px 70px rgba(15, 23, 42, 0.10);
            backdrop-filter: blur(12px);
            text-align: center;
            border: 1px solid rgba(226, 232, 240, 0.92);
        }
        .modal-card h2 {
            font-size: 24px; font-weight: 700; color: #374151;
            margin-bottom: 10px;
        }
        .login-card-head {
            display: block;
            margin-bottom: 20px;
        }
        .modal-confirm {
            padding: 10px 36px; border-radius: 10px; border: none;
            background: linear-gradient(180deg, #7c8796 0%, #636d7b 100%);
            color: white;
            font-size: 15px; font-weight: 600; cursor: pointer;
            font-family: inherit; transition: all 0.15s;
        }
        .modal-confirm:hover {
            background: linear-gradient(180deg, #707b89 0%, #57616e 100%);
        }
        .modal-confirm:disabled { opacity: 0.5; cursor: not-allowed; }
        .login-fields {
            display: grid;
            gap: 12px;
        }
        .login-fields select,
        .login-fields input {
            width: 100%;
            padding: 11px 13px;
            border: 1px solid #d8dee6;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            color: #475569;
            background: rgba(255, 255, 255, 0.84);
        }
        .login-fields select:focus,
        .login-fields input:focus {
            outline: none;
            border-color: #94a3b8;
            box-shadow: 0 0 0 3px rgba(148, 163, 184, 0.16);
        }
        .login-error {
            min-height: 18px;
            color: #dc2626;
            font-size: 13px;
            text-align: center;
        }
        .login-links {
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }
        .login-links a {
            color: #6b7280;
            text-decoration: none;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .login-links a:hover { color: #475569; }
        .login-mini-icon {
            width: 14px;
            height: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: currentColor;
            flex-shrink: 0;
        }

        .admin-only { display: none; }
        body.is-admin .admin-only { display: inline-flex; }
        body.is-admin .main,
        body.is-admin .vote-bar,
        body.is-admin .progress-subbar,
        body.is-admin .leaderboard-toggle,
        body.is-admin .leaderboard-panel { display: none !important; }

        .admin-page {
            display: none;
            margin-top: calc(var(--toolbar-h) + var(--subbar-h));
            min-height: calc(100vh - var(--toolbar-h) - var(--subbar-h));
            padding: 24px;
            background: linear-gradient(180deg, #f8fafc, #eef6f5);
        }
        body.is-admin .admin-page { display: block; }
        .admin-shell {
            width: min(1180px, calc(100vw - 48px));
            margin: 0 auto;
            display: grid;
            gap: 18px;
        }
        .admin-card {
            background: #fff;
            border: 1px solid #dbe4ea;
            border-radius: 16px;
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
            padding: 22px 24px;
        }
        .admin-card h2 {
            font-size: 18px;
            color: #0f172a;
            margin-bottom: 6px;
        }
        .admin-card p {
            font-size: 13px;
            color: #64748b;
            line-height: 1.7;
        }
        .admin-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 16px;
        }
        .admin-actions .btn-sm {
            padding: 8px 12px;
            font-size: 13px;
        }
        .admin-grid {
            display: grid;
            gap: 16px;
            margin-top: 16px;
        }
        .admin-subcard {
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            background: #fcfdff;
            padding: 16px 18px;
        }
        .admin-subcard h3 {
            font-size: 15px;
            color: #0f172a;
            margin-bottom: 6px;
        }
        .admin-subcard p {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 12px;
        }
        .admin-table-wrap {
            overflow-x: auto;
            margin-top: 16px;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .admin-table th,
        .admin-table td {
            border-bottom: 1px solid #edf2f7;
            padding: 10px 12px;
            text-align: left;
            color: #334155;
            vertical-align: middle;
        }
        .admin-table th {
            font-size: 12px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: #64748b;
            background: #f8fafc;
        }
        .admin-table td strong {
            color: #0f172a;
        }
        .admin-stat {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 600;
            background: #ecfeff;
            color: #0f766e;
        }
        .admin-danger {
            background: #fff1f2 !important;
            border-color: #fecdd3 !important;
            color: #be123c !important;
        }
        .admin-progress-empty { color: #94a3b8; }
        .admin-progress-partial {
            color: #b45309;
            background: #fffbeb;
            border-radius: 999px;
            padding: 3px 8px;
            display: inline-flex;
        }
        .admin-progress-done {
            color: #047857;
            background: #ecfdf5;
            border-radius: 999px;
            padding: 3px 8px;
            display: inline-flex;
        }
        .admin-empty {
            margin-top: 16px;
            padding: 24px;
            border: 1px dashed #cbd5e1;
            border-radius: 14px;
            text-align: center;
            color: #64748b;
            font-size: 13px;
            background: #f8fafc;
        }

        /* ─── Leaderboard ─── */
        .leaderboard-toggle {
            position: fixed; bottom: var(--votebar-h); right: 24px;
            z-index: 101;
        }
        .leaderboard-toggle button {
            padding: 6px 14px; border-radius: 8px 8px 0 0;
            border: 1px solid #e0e0e0; border-bottom: none;
            background: white; color: #6b7280; font-size: 12px;
            font-weight: 600; cursor: pointer; font-family: inherit;
            transition: all 0.15s;
        }
        .leaderboard-toggle button:hover { color: var(--primary); }

        .leaderboard-panel {
            position: fixed; bottom: var(--votebar-h); right: 24px;
            width: 480px; max-height: 360px;
            background: white; border: 1px solid #e5e7eb;
            border-radius: 12px 12px 0 0;
            box-shadow: 0 -4px 20px rgba(15,23,42,0.08);
            z-index: 102; overflow: hidden;
            display: none; flex-direction: column;
        }
        .leaderboard-panel.show { display: flex; }

        .leaderboard-header {
            padding: 12px 16px; border-bottom: 1px solid #f3f4f6;
            display: flex; align-items: center; justify-content: space-between;
            background: #fafafa;
        }
        .leaderboard-header h3 {
            font-size: 14px; font-weight: 700; color: #111827;
        }
        .leaderboard-header button {
            background: none; border: none; cursor: pointer;
            font-size: 18px; color: #9ca3af; line-height: 1;
        }

        .leaderboard-body {
            flex: 1; overflow-y: auto; padding: 8px 0;
        }

        .lb-table {
            width: 100%; border-collapse: collapse; font-size: 13px;
        }
        .lb-table th {
            text-align: left; padding: 6px 14px;
            font-size: 11px; font-weight: 700; color: #9ca3af;
            letter-spacing: 0.05em; text-transform: uppercase;
            border-bottom: 1px solid #f3f4f6;
        }
        .lb-table td {
            padding: 8px 14px; border-bottom: 1px solid #f9fafb;
            color: #374151;
        }
        .lb-table tr:hover td { background: #f9fafb; }
        .lb-rank { font-weight: 700; color: var(--primary); width: 40px; }
        .lb-elo { font-weight: 700; font-variant-numeric: tabular-nums; }
        .lb-record { color: #6b7280; font-size: 12px; font-variant-numeric: tabular-nums; }

        .lb-empty {
            text-align: center; padding: 32px; color: #9ca3af; font-size: 13px;
        }

        /* ─── All Done State ─── */
        .all-done {
            display: none; flex-direction: column; align-items: center;
            justify-content: center; text-align: center; padding: 60px 24px;
            color: #6b7280;
        }
        .all-done h2 { font-size: 22px; color: #111827; margin-bottom: 8px; }
        .all-done p { font-size: 14px; margin-bottom: 20px; }

        /* ─── Mobile ─── */
        @media (max-width: 768px) {
            .main {
                flex-direction: column;
                gap: 8px;
                padding: 10px 12px;
            }
            .panel { flex: none; height: 50%; }
            .vote-bar {
                height: auto; flex-wrap: wrap; justify-content: center;
                padding: 8px 12px; gap: 6px;
            }
            .vote-reason textarea { width: 100%; }
            .main { bottom: auto; top: calc(var(--toolbar-h) + var(--subbar-h)); }
            .toolbar .spacer { display: none; }
            .toolbar { padding: 0 12px; gap: 8px; flex-wrap: nowrap; overflow-x: auto; }
            .progress-subbar { padding: 0 12px; }
            .leaderboard-panel { width: calc(100% - 24px); right: 12px; }
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>

<!-- Login overlay -->
<div class="modal-overlay" id="loginOverlay">
    <div class="modal-card">
        <div class="login-card-head">
            <h2>LENS Arena</h2>
        </div>
        <div class="login-fields">
            <select id="loginUser">
                <option value="">-- 選擇評審者 --</option>
            </select>
            <input type="password" id="loginPassword" placeholder="密碼" onkeydown="if(event.key==='Enter')doLogin()">
            <div class="login-error" id="loginError"></div>
            <button class="modal-confirm" id="loginSubmit" onclick="doLogin()">登入</button>
        </div>
        <div class="login-links">
            <a href="#" id="adminLoginLink" onclick="event.preventDefault();toggleAdminLogin()">
                <span class="login-mini-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="5" y="11" width="14" height="9" rx="2"></rect>
                        <path d="M8 11V8a4 4 0 0 1 8 0v3"></path>
                    </svg>
                </span>
                <span>管理員入口</span>
            </a>
            <a href="index.html">
                <span class="login-mini-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 11.5 12 4l9 7.5"></path>
                        <path d="M6 10.5V20h12v-9.5"></path>
                        <path d="M10 20v-5h4v5"></path>
                    </svg>
                </span>
                <span>返回首頁</span>
            </a>
        </div>
    </div>
</div>

<!-- Toolbar -->
<div class="toolbar">
    <h1>LENS Arena</h1>
    <span class="progress-badge" id="progressBadge">載入中...</span>
    <span class="spacer"></span>
    <span class="progress-badge" id="cloudStatus">雲端待命</span>
    <span class="eval-label">評審：</span>
    <select id="evalSelect"></select>
    <span class="progress-badge" id="userBadge">未登入</span>
    <button class="btn-sm admin-only" id="btnAdminPanel">管理總覽</button>
    <button class="btn-sm btn-timeline" id="btnTimeline">案件時間軸</button>
    <a class="nav-link" href="index.html">首頁</a>
    <button class="btn-sm" id="btnExport">匯出 JSON</button>

    <span class="subbar-label">案件進度</span>

            <span class="panel-title">摘要 A</span>
            <span class="panel-meta" id="metaA"></span>

    <div class="panel" id="panelB">

            <span class="panel-title">摘要 B</span>

        </div>

<script>
(function() {
    'use strict';

    const firebaseConfig = {
        apiKey: "AIzaSyCIs5MX4evekzi3o8Coz8alRhXFAqAkJuA",
        authDomain: "law-eval-2f86e.firebaseapp.com",
        projectId: "law-eval-2f86e",
        storageBucket: "law-eval-2f86e.firebasestorage.app",
        messagingSenderId: "850825118261",
        appId: "1:850825118261:web:dab7cc69af88d0d99b277c"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const ARENA_STORAGE_VERSION = 'v1';
    const ARENA_CAMPAIGN_ID = 'arena_20260411_5eval_4cond_15case_core5pair_v2';
    const ARENA_AUTH_USER_KEY = 'arena_v1_auth_user';
    const ARENA_AUTH_ROLE_KEY = 'arena_v1_auth_role';
    const ARENA_USERS = {
        'A': { role: 'evaluator', email: 'arena-a@law-eval.local' },
        'B': { role: 'evaluator', email: 'arena-b@law-eval.local' },
        'C': { role: 'evaluator', email: 'arena-c@law-eval.local' },
        'D': { role: 'evaluator', email: 'arena-d@law-eval.local' },
        'E': { role: 'evaluator', email: 'arena-e@law-eval.local' },
        'admin': { role: 'admin', email: 'arena-admin@law-eval.local' }
    };
    const ARENA_USER_BY_EMAIL = Object.fromEntries(
        Object.entries(ARENA_USERS).map(([name, info]) => [info.email, { name, role: info.role, email: info.email }])
    );

    let config = null;
    let currentEvaluator = null;
    let currentPair = null;
    let selectedVote = null;
    let dataA = null, dataB = null;
    let currentCaseName = '';
    let cloudStatusTimer = null;
    let appReady = false;
    let adminLoginMode = false;
    let currentDataUid = '';
    let adminPanelLoaded = false;
    let pendingCaseOverride = '';

    function getArenaVotesStorageKey(evaluator) {
        return `arena_v1_votes_${evaluator}`;
    }

    function setLocalSessionProfile(name, role) {
        localStorage.setItem(ARENA_AUTH_USER_KEY, name);
        localStorage.setItem(ARENA_AUTH_ROLE_KEY, role);
    }

    function clearLocalSessionProfile() {
        localStorage.removeItem(ARENA_AUTH_USER_KEY);
        localStorage.removeItem(ARENA_AUTH_ROLE_KEY);
    }

    function loadVotesForEvaluator(evaluator) {
        if (!evaluator) return [];
        try {
            const raw = localStorage.getItem(getArenaVotesStorageKey(evaluator));
            return raw ? JSON.parse(raw) : [];
        } catch (e) {
            return [];
        }
    }

    function saveVotesForEvaluator(evaluator, votes) {
        if (!evaluator) return;
        localStorage.setItem(getArenaVotesStorageKey(evaluator), JSON.stringify(votes));
    }

    function getVotes(evaluator) {
        return loadVotesForEvaluator(evaluator).filter(v => v.evaluator === evaluator && isCurrentCampaignVote(v));
    }

    function setEvaluator(ev) {
        currentEvaluator = ev;
    }

    function setCloudStatus(text, state) {
        const el = document.getElementById('cloudStatus');
        if (!el) return;
        el.textContent = text;
        el.dataset.state = state || '';
    }

    function getAuthProfile(user = auth.currentUser) {
        if (!user || !user.email) return null;
        return ARENA_USER_BY_EMAIL[user.email] || null;
    }

    function getCloudEvaluatorId() {
        return auth.currentUser ? auth.currentUser.uid : '';
    }

    function fsDocId(key) {
        return encodeURIComponent(key).substring(0, 1400);
    }

    function cloudRecordRef(uid, key) {
        return db.collection('arena_evals').doc(uid).collection('records').doc(fsDocId(key));
    }

    function makeArenaRecordKey(vote) {
        const pair = [vote.condition_a, vote.condition_b].sort();
        return `arena_v1_${vote.case_id}__${pair[0]}__${pair[1]}`;
    }

    function stampVote(vote) {
        return {
            ...vote,
            _campaign_id: ARENA_CAMPAIGN_ID,
            _storage_version: ARENA_STORAGE_VERSION
        };
    }

    function isCurrentCampaignVote(vote) {
        if (!vote || typeof vote !== 'object') return false;
        if (vote._campaign_id !== ARENA_CAMPAIGN_ID) return false;
        const pair = [vote.condition_a, vote.condition_b].sort();
        return config.conditions.includes(pair[0]) && config.conditions.includes(pair[1]) && getPairWeight(pair[0], pair[1]) > 0;
    }

    async function writeCloudRecord(vote) {
        const uid = getCloudEvaluatorId();
        if (!uid) return;
        const key = makeArenaRecordKey(vote);
        setCloudStatus('同步中', 'syncing');
        clearTimeout(cloudStatusTimer);
        await cloudRecordRef(uid, key).set({
            key,
            data: vote,
            updated: firebase.firestore.FieldValue.serverTimestamp()
        });
        setCloudStatus('已同步', 'synced');
        cloudStatusTimer = setTimeout(() => setCloudStatus('雲端待命', ''), 2500);
    }

    async function syncArenaUserIndex(user, profile) {
        if (!user || !profile) return;
        await db.collection('arena_users').doc(user.uid).set({
            uid: user.uid,
            email: user.email || '',
            name: profile.name,
            role: profile.role,
            updated: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
    }

    async function lookupArenaUidByName(name) {
        const snapshot = await db.collection('arena_users').where('name', '==', name).limit(1).get();
        if (snapshot.empty) return '';
        return snapshot.docs[0].id;
    }

    async function restoreArenaVotes(evaluator, uidOverride) {
        const uid = uidOverride || getCloudEvaluatorId();
        if (!uid || !evaluator) return;
        currentDataUid = uid;
        setCloudStatus('同步中', 'syncing');
        const snapshot = await db.collection('arena_evals').doc(uid).collection('records').get();
        const votes = [];
        snapshot.forEach(doc => {
            const payload = doc.data() || {};
            if (!payload.data) return;
            if (!isCurrentCampaignVote(payload.data)) return;
            votes.push(payload.data);
        });
        votes.sort((a, b) => String(a.timestamp || '').localeCompare(String(b.timestamp || '')));
        saveVotesForEvaluator(evaluator, votes);
        setCloudStatus('已同步', 'synced');
        cloudStatusTimer = setTimeout(() => setCloudStatus('雲端待命', ''), 2500);
    }

    async function clearArenaVotes() {
        const uid = currentDataUid || getCloudEvaluatorId();
        if (!uid || !currentEvaluator) return;
        const snapshot = await db.collection('arena_evals').doc(uid).collection('records').get();
        const batch = db.batch();
        snapshot.forEach(doc => batch.delete(doc.ref));
        if (!snapshot.empty) await batch.commit();
        saveVotesForEvaluator(currentEvaluator, []);
    }

    async function deleteArenaVotesForEvaluator(name) {
        const uid = await lookupArenaUidByName(name);
        if (!uid) {
            saveVotesForEvaluator(name, []);
            return false;
        }
        const snapshot = await db.collection('arena_evals').doc(uid).collection('records').get();
        const batch = db.batch();
        snapshot.forEach(doc => batch.delete(doc.ref));
        if (!snapshot.empty) await batch.commit();
        saveVotesForEvaluator(name, []);
        return true;
    }

    async function doLogin() {
        const userSel = document.getElementById('loginUser');
        const passInput = document.getElementById('loginPassword');
        const errorEl = document.getElementById('loginError');
        const name = adminLoginMode ? 'admin' : userSel.value;
        const password = passInput.value;

        errorEl.textContent = '';
        if (!name) { errorEl.textContent = '請選擇評審者'; return; }
        if (!password) { errorEl.textContent = '請輸入密碼'; return; }
        const user = ARENA_USERS[name];
        if (!user) { errorEl.textContent = '使用者不存在'; return; }

        try {
            await auth.signInWithEmailAndPassword(user.email, password);
        } catch (e) {
            console.error('Arena login failed:', e);
            errorEl.textContent = '登入失敗，請確認帳號與密碼';
        }
    }
    window.doLogin = doLogin;

    async function logout() {
        try {
            await auth.signOut();
        } finally {
            currentDataUid = '';
            clearLocalSessionProfile();
            location.reload();
        }
    }

    function hideLoginOverlay() {
        document.getElementById('loginOverlay').classList.add('hidden');
    }

    function showLoginOverlay() {
        const overlay = document.getElementById('loginOverlay');
        const sel = document.getElementById('loginUser');
        adminLoginMode = false;
        setAdminMode(false);
        overlay.classList.remove('hidden');
        sel.disabled = false;
        if (sel.options.length <= 1) {
            Object.keys(ARENA_USERS).filter(name => name !== 'admin').forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = '評審 ' + name;
                sel.appendChild(opt);
            });
        }
        document.querySelector('#adminLoginLink span:last-child').textContent = '管理員入口';
        document.getElementById('loginPassword').placeholder = '密碼';
        document.getElementById('loginPassword').value = '';
        document.getElementById('loginError').textContent = '';
    }

    function toggleAdminLogin() {
        adminLoginMode = !adminLoginMode;
        const sel = document.getElementById('loginUser');
        const link = document.getElementById('adminLoginLink');
        const label = link.querySelector('span:last-child');
        if (adminLoginMode) {
            sel.value = '';
            sel.disabled = true;
            label.textContent = '返回評審登入';
            document.getElementById('loginPassword').placeholder = '管理者密碼';
        } else {
            sel.disabled = false;
            label.textContent = '管理員入口';
            document.getElementById('loginPassword').placeholder = '密碼';
        }
        document.getElementById('loginError').textContent = '';
    }
    window.toggleAdminLogin = toggleAdminLogin;

    function applyReadOnlyMode(isReadOnly) {
        document.getElementById('voteBar').style.display = isReadOnly ? 'none' : 'flex';
        document.getElementById('btnClear').style.display = isReadOnly ? 'none' : '';
    }

    function setAdminMode(enabled) {
        document.body.classList.toggle('is-admin', !!enabled);
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function renderContent(text) {
        if (!text) return '<div class="empty-content">此版本無此章節內容</div>';
        const escaped = escapeHtml(text);
        return escaped.replace(/\[CH_(\d+)\]/g, '<span class="citation">[CH_$1]</span>');
    }

    function getAllPairs() {
        const conds = config.conditions;
        const pairs = [];
        for (let i = 0; i < conds.length; i++) {
            for (let j = i + 1; j < conds.length; j++) {
                pairs.push([conds[i], conds[j]]);
            }
        }
        return pairs;
    }

    function getEffectivePairs() {
        return getAllPairs()
            .map(([condA, condB]) => ({ condA, condB, weight: getPairWeight(condA, condB) }))
            .filter(item => item.weight > 0)
            .sort((a, b) => b.weight - a.weight || a.condA.localeCompare(b.condA) || a.condB.localeCompare(b.condB));
    }

    function getPairStorageKey(caseId, condA, condB) {
        const cs = [condA, condB].sort().join('||');
        return `${caseId}||${cs}`;
    }

    function getPairWeight(condA, condB) {
        const backA = config.backbone_map[condA], backB = config.backbone_map[condB];
        const roleA = config.role_map[condA], roleB = config.role_map[condB];
        const sameBB = backA === backB;
        const roles = [roleA, roleB].sort().join('_');

        if (sameBB) {
            if (roles === 'baseline_full') return config.pair_weights.same_backbone_full_vs_baseline;
            if (roles === 'ablation_full') return config.pair_weights.same_backbone_full_vs_ablation;
            if (roles === 'ablation_ablation') return config.pair_weights.same_backbone_ablation_vs_ablation;
            if (roles === 'ablation_baseline') return config.pair_weights.same_backbone_ablation_vs_baseline;
        } else {
            if (roles === 'full_full') return config.pair_weights.cross_backbone_full_vs_full;
            if (roles === 'baseline_baseline') return config.pair_weights.cross_backbone_baseline_vs_baseline;
            return config.pair_weights.cross_backbone_other;
        }
        return 1;
    }

    function buildPool() {
        const pairs = getEffectivePairs();
        const votes = getVotes(currentEvaluator);
        const voted = new Set(votes.map(v => {
            return getPairStorageKey(v.case_id, v.condition_a, v.condition_b);
        }));

        const pool = [];
        const caseOrder = pendingCaseOverride
            ? [pendingCaseOverride, ...config.cases.map(c => c.case_id).filter(id => id !== pendingCaseOverride)]
            : config.cases.map(c => c.case_id);

        for (const caseId of caseOrder) {
            const remaining = [];
            pairs.forEach((pair, pairIndex) => {
                const key = getPairStorageKey(caseId, pair.condA, pair.condB);
                if (voted.has(key)) return;
                remaining.push({ case_id: caseId, condA: pair.condA, condB: pair.condB, weight: pair.weight, pairIndex });
            });
            if (remaining.length > 0) {
                pool.push(...remaining);
                break;
            }
        }
        return pool;
    }

    function pickNextPair() {
        const pool = buildPool();
        if (!pool.length) return null;
        const topWeight = pool[0].weight;
        const candidates = pool.filter(item => item.weight === topWeight);
        const pick = candidates[Math.floor(Math.random() * candidates.length)];

        const swap = Math.random() < 0.5;
        pendingCaseOverride = '';
        return {
            case_id: pick.case_id,
            condA: swap ? pick.condB : pick.condA,
            condB: swap ? pick.condA : pick.condB,
            displayOrder: swap ? 'b_left' : 'a_left',
            loadedAt: Date.now(),
            pairIndex: pick.pairIndex
        };
    }

    async function fetchJson(url) {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('fetch failed: ' + url);
        return resp.json();
    }

    async function loadPairData(pair) {
        const [a, b] = await Promise.all([
            fetchJson('./data/' + pair.condA + '/' + pair.case_id + '.json'),
            fetchJson('./data/' + pair.condB + '/' + pair.case_id + '.json')
        ]);
        return { a, b };
    }

    function updateProgress() {
        const votes = getVotes(currentEvaluator);
        const totalCases = config.cases.length;
        const totalPairs = getPairsPerCase();
        const completedCases = config.cases.filter(item => getCaseVoteCount(item.case_id) >= totalPairs).length;
        const totalVotes = totalCases * totalPairs;
        const badge = document.getElementById('progressBadge');
        badge.textContent = '案件 ' + completedCases + '/' + totalCases + ' \u00b7 已投票 ' + votes.length + '/' + totalVotes;
        renderCasePills();
        renderPairIndicators();
    }

    function getCaseVoteCount(caseId) {
        return getVotes(currentEvaluator).filter(v => v.case_id === caseId).length;
    }

    function renderCasePills() {
        const wrap = document.getElementById('casePills');
        if (!wrap || !config) return;
        const total = getPairsPerCase();
        wrap.innerHTML = '';
        config.cases.forEach((item, idx) => {
            const done = getCaseVoteCount(item.case_id);
            const btn = document.createElement('button');
            btn.className = 'case-pill';
            if (currentPair && currentPair.case_id === item.case_id) btn.classList.add('active');
            else if (done >= total) btn.classList.add('done');
            else if (done > 0) btn.classList.add('partial');
            btn.textContent = String(idx + 1);
            btn.title = `${item.short_name || item.case_id} (${done}/${total})`;
            btn.addEventListener('click', async () => {
                pendingCaseOverride = item.case_id;
                await loadNextPair();
            });
            wrap.appendChild(btn);
        });
    }

    function renderPairIndicators() {
        const wrap = document.getElementById('pairIndicators');
        if (!wrap || !config || !currentEvaluator) return;
        const activeCaseId = currentPair ? currentPair.case_id : (pendingCaseOverride || config.cases[0].case_id);
        const effectivePairs = getEffectivePairs();
        const votes = getVotes(currentEvaluator);
        const voted = new Set(votes.filter(v => v.case_id === activeCaseId).map(v => getPairStorageKey(v.case_id, v.condition_a, v.condition_b)));
        wrap.innerHTML = '';
        effectivePairs.forEach((pair, idx) => {
            const pill = document.createElement('span');
            pill.className = 'pair-pill';
            const key = getPairStorageKey(activeCaseId, pair.condA, pair.condB);
            if (currentPair && currentPair.case_id === activeCaseId && currentPair.pairIndex === idx) pill.classList.add('active');
            else if (voted.has(key)) pill.classList.add('done');
            else pill.classList.add('partial');
            pill.textContent = String(idx + 1);
            pill.title = `Pair ${idx + 1}`;
            wrap.appendChild(pill);
        });
    }

    function renderAllSections(sections) {
        if (!sections || sections.length === 0) return '<div class="empty-content">無摘要內容</div>';
        return sections.map(s => {
            const title = escapeHtml(s.title || s.id);
            const body = renderContent(s.content);
            return '<div class="section-block"><div class="section-title">' + title + '</div>' +
                '<div class="section-content">' + body + '</div></div>';
        }).join('');
    }

    function calcCompressionMeta(data) {
        const chunks = data.chunks || {};
        const origChars = Object.values(chunks).reduce((s, t) => s + t.length, 0);
        const sumChars = (data.sections || []).reduce((s, sec) => s + (sec.content || '').length, 0);
        if (origChars === 0) return '';
        const pct = Math.round((1 - sumChars / origChars) * 100);
        return origChars.toLocaleString() + ' → ' + sumChars.toLocaleString() + ' 字' +
            '<span class="compress-pct">縮減 ' + pct + '%</span>';
    }

    function renderPanels() {
        if (!dataA || !dataB) return;
        document.getElementById('bodyA').innerHTML = renderAllSections(dataA.sections);
        document.getElementById('bodyB').innerHTML = renderAllSections(dataB.sections);
        document.getElementById('metaA').innerHTML = calcCompressionMeta(dataA);
        document.getElementById('metaB').innerHTML = calcCompressionMeta(dataB);
    }

    function getPairsPerCase() {
        return config ? getEffectivePairs().length : 0;
    }

    async function fetchAdminDataset() {
        const names = Object.keys(ARENA_USERS).filter(name => name !== 'admin');
        const evaluators = await Promise.all(names.map(async (name) => {
            const uid = await lookupArenaUidByName(name);
            const votes = [];
            if (uid) {
                const snapshot = await db.collection('arena_evals').doc(uid).collection('records').get();
                snapshot.forEach(doc => {
                    const payload = doc.data() || {};
                    if (payload.data && isCurrentCampaignVote(payload.data)) votes.push(payload.data);
                });
            }
            const voteCount = votes.length;
            const caseCount = new Set(votes.map(v => v.case_id)).size;
            const lastTimestamp = votes.reduce((latest, v) => {
                const ts = String(v.timestamp || '');
                return ts > latest ? ts : latest;
            }, '');
            return { name, uid, votes, voteCount, caseCount, lastTimestamp };
        }));
        return {
            evaluators,
            allVotes: evaluators.flatMap(item => item.votes)
        };
    }

    function formatAdminTime(ts) {
        if (!ts) return '尚無資料';
        return ts.replace('T', ' ').replace('Z', '');
    }

    function calcAggregateElo(votes) {
        const elo = {};
        for (const cond of config.conditions) {
            elo[cond] = { rating: 1000, wins: 0, draws: 0, losses: 0, matches: 0, cases: new Set() };
        }
        for (const v of votes) {
            const a = v.condition_a;
            const b = v.condition_b;
            if (!elo[a] || !elo[b]) continue;
            elo[a].matches++;
            elo[b].matches++;
            elo[a].cases.add(v.case_id);
            elo[b].cases.add(v.case_id);
            const ea = 1 / (1 + Math.pow(10, (elo[b].rating - elo[a].rating) / 400));
            const eb = 1 - ea;
            const K = 32;
            let sa;
            let sb;
            if (v.winner === 'a') {
                sa = 1; sb = 0; elo[a].wins++; elo[b].losses++;
            } else if (v.winner === 'b') {
                sa = 0; sb = 1; elo[b].wins++; elo[a].losses++;
            } else {
                sa = 0.5; sb = 0.5; elo[a].draws++; elo[b].draws++;
            }
            elo[a].rating += K * (sa - ea);
            elo[b].rating += K * (sb - eb);
        }
        return Object.entries(elo).map(([cond, data]) => ({
            condition: cond,
            label: config.condition_labels[cond] || cond,
            rating: Math.round(data.rating),
            wins: data.wins,
            draws: data.draws,
            losses: data.losses,
            matches: data.matches,
            caseCount: data.cases.size
        })).sort((x, y) => y.rating - x.rating);
    }

    function getCaseProgressClass(done, total) {
        if (!done) return 'admin-progress-empty';
        if (done >= total) return 'admin-progress-done';
        return 'admin-progress-partial';
    }

    function renderAdminSummaryTable(rows) {
        let html = '<div class="admin-subcard"><h3>評審進度摘要</h3><p>顯示每位評審目前累積票數、案件覆蓋數與最後更新時間。</p>';
        html += '<div class="admin-table-wrap"><table class="admin-table"><thead><tr>';
        html += '<th>評審</th><th>狀態</th><th>已投票</th><th>案件數</th><th>最後更新</th><th>操作</th>';
        html += '</tr></thead><tbody>';
        rows.forEach(row => {
            const statusLabel = row.voteCount > 0 ? '已有資料' : '尚未開始';
            html += '<tr>';
            html += `<td><strong>${escapeHtml(row.name)}</strong></td>`;
            html += `<td><span class="admin-stat">${statusLabel}</span></td>`;
            html += `<td>${row.voteCount}</td>`;
            html += `<td>${row.caseCount} / ${config.cases.length}</td>`;
            html += `<td>${escapeHtml(formatAdminTime(row.lastTimestamp))}</td>`;
            html += `<td><button class="btn-sm admin-danger" onclick="adminDeleteEvaluator(${JSON.stringify(row.name)})">刪除 ${escapeHtml(row.name)} 資料</button></td>`;
            html += '</tr>';
        });
        html += '</tbody></table></div></div>';
        return html;
    }

    function renderAggregateEloTable(votes) {
        const rows = calcAggregateElo(votes);
        let html = '<div class="admin-subcard"><h3>全體合併 Elo</h3><p>彙總 A-E 全部投票，顯示整體偏好排序。</p>';
        html += '<div class="admin-table-wrap"><table class="admin-table"><thead><tr>';
        html += '<th>#</th><th>Condition</th><th>Elo</th><th>W / D / L</th><th>比較次數</th><th>覆蓋案件</th>';
        html += '</tr></thead><tbody>';
        rows.forEach((row, idx) => {
            html += '<tr>';
            html += `<td>${idx + 1}</td>`;
            html += `<td><strong>${escapeHtml(row.label)}</strong></td>`;
            html += `<td>${row.rating}</td>`;
            html += `<td>${row.wins} / ${row.draws} / ${row.losses}</td>`;
            html += `<td>${row.matches}</td>`;
            html += `<td>${row.caseCount}</td>`;
            html += '</tr>';
        });
        html += '</tbody></table></div></div>';
        return html;
    }

    function renderProgressMatrix(rows) {
        const totalPairs = getPairsPerCase();
        let html = '<div class="admin-subcard"><h3>案件進度矩陣</h3><p>每格顯示該評審在該案件已完成的配對票數。</p>';
        html += '<div class="admin-table-wrap"><table class="admin-table"><thead><tr>';
        html += '<th>案件</th>';
        rows.forEach(row => { html += `<th>${escapeHtml(row.name)}</th>`; });
        html += '</tr></thead><tbody>';
        config.cases.forEach(item => {
            html += '<tr>';
            html += `<td><strong>${escapeHtml(item.short_name || item.case_id)}</strong></td>`;
            rows.forEach(row => {
                const done = row.votes.filter(v => v.case_id === item.case_id).length;
                const cls = getCaseProgressClass(done, totalPairs);
                html += `<td><span class="${cls}">${done}/${totalPairs}</span></td>`;
            });
            html += '</tr>';
        });
        html += '</tbody></table></div></div>';
        return html;
    }

    async function renderAdminContent() {
        const container = document.getElementById('adminContent');
        container.innerHTML = '<div class="admin-empty">載入中...</div>';
        const dataset = await fetchAdminDataset();
        const rows = dataset.evaluators;
        if (!rows.length) {
            container.innerHTML = '<div class="admin-empty">尚無可顯示的評審資料</div>';
            return;
        }
        let html = '<div class="admin-grid">';
        html += renderAggregateEloTable(dataset.allVotes);
        html += renderAdminSummaryTable(rows);
        html += renderProgressMatrix(rows);
        html += '</div>';
        container.innerHTML = html;
    }

    async function adminDeleteEvaluator(name) {
        if (!confirm(`刪除 ${name} 的全部 arena 投票資料？此操作無法復原。`)) return;
        try {
            await deleteArenaVotesForEvaluator(name);
            if (currentEvaluator === name) {
                updateProgress();
                await loadNextPair();
            }
            await renderAdminContent();
        } catch (e) {
            console.error('Admin delete failed:', e);
            alert('刪除失敗，請查看 console。');
        }
    }
    window.adminDeleteEvaluator = adminDeleteEvaluator;

    async function adminExportAll() {
        const dataset = await fetchAdminDataset();
        const output = {};
        for (const row of dataset.evaluators) {
            const votes = row.votes.slice();
            output[row.name] = {
                vote_count: votes.length,
                case_count: new Set(votes.map(v => v.case_id)).size,
                votes
            };
        }
        const blob = new Blob([JSON.stringify(output, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `arena_admin_all_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function initAdminPanel() {
        document.getElementById('btnAdminPanel').addEventListener('click', async () => {
            setAdminMode(true);
            adminPanelLoaded = true;
            await renderAdminContent();
        });
        document.getElementById('adminRefreshBtn').addEventListener('click', renderAdminContent);
        document.getElementById('adminExportBtn').addEventListener('click', adminExportAll);
    }

    window.closeTlModal = function(event) {
        if (event && event.target !== event.currentTarget) return;
        document.getElementById('tlModal').classList.add('hidden');
        document.getElementById('tlIframe').src = '';
    };

    function openTlModal() {
        if (!currentCaseName) return;
        document.getElementById('tlModalTitle').textContent = '案件時間軸 — ' + currentCaseName;
        document.getElementById('tlIframe').src = 'timeline.html?case=' + encodeURIComponent(currentCaseName) + '&embed=1';
        document.getElementById('tlModal').classList.remove('hidden');
    }

    function resetVoteUI() {
        selectedVote = null;
        document.querySelectorAll('.vote-btn').forEach(b => {
            b.classList.remove('selected-a', 'selected-b', 'selected-tie');
        });
        document.getElementById('reasonText').value = '';
        document.getElementById('submitBtn').disabled = true;
    }

    function showAllDone() {
        document.getElementById('mainArea').querySelectorAll('.panel').forEach(p => p.style.display = 'none');
        document.getElementById('allDone').style.display = 'flex';
        document.getElementById('voteBar').style.display = 'none';
    }

    function showPairUI() {
        document.getElementById('mainArea').querySelectorAll('.panel').forEach(p => p.style.display = 'flex');
        document.getElementById('allDone').style.display = 'none';
        document.getElementById('voteBar').style.display = getAuthProfile() && getAuthProfile().role === 'admin' ? 'none' : 'flex';
    }

    async function loadNextPair() {
        if (!currentEvaluator) return;
        const pair = pickNextPair();
        if (!pair) {
            showAllDone();
            updateProgress();
            return;
        }

        showPairUI();
        currentPair = pair;
        resetVoteUI();

        const caseInfo = config.cases.find(c => c.case_id === pair.case_id);

        try {
            const { a, b } = await loadPairData(pair);
            dataA = a;
            dataB = b;
            renderPanels();
        } catch(e) {
            console.error('Failed to load pair data:', e);
            document.getElementById('bodyA').innerHTML = '<div class="empty-content">載入失敗</div>';
            document.getElementById('bodyB').innerHTML = '<div class="empty-content">載入失敗</div>';
        }

        currentCaseName = (dataA && dataA.case_name) || (caseInfo && caseInfo.short_name) || pair.case_id;

        updateProgress();
    }

    function initVoteButtons() {
        document.querySelectorAll('.vote-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const vote = btn.dataset.vote;
                selectedVote = vote;

                document.querySelectorAll('.vote-btn').forEach(b => {
                    b.classList.remove('selected-a', 'selected-b', 'selected-tie');
                });

                if (vote === 'a') btn.classList.add('selected-a');
                else if (vote === 'b') btn.classList.add('selected-b');
                else btn.classList.add('selected-tie');

                document.getElementById('submitBtn').disabled = false;
            });
        });

        document.getElementById('submitBtn').addEventListener('click', submitVote);
    }

    async function submitVote() {
        if (!selectedVote || !currentPair) return;

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        const durationSec = Math.round((Date.now() - currentPair.loadedAt) / 1000);
        const vote = stampVote({
            evaluator: currentEvaluator,
            case_id: currentPair.case_id,
            condition_a: currentPair.condA,
            condition_b: currentPair.condB,
            display_order: currentPair.displayOrder,
            winner: selectedVote,
            reason: document.getElementById('reasonText').value.trim(),
            timestamp: new Date().toISOString(),
            duration_sec: durationSec
        });

        const votes = getVotes(currentEvaluator);
        const key = makeArenaRecordKey(vote);
        const nextVotes = votes.filter(v => makeArenaRecordKey(v) !== key);
        nextVotes.push(vote);
        saveVotesForEvaluator(currentEvaluator, nextVotes);

        try {
            await writeCloudRecord(vote);
            showFlash();
        } catch (e) {
            console.error('Arena vote sync failed:', e);
            setCloudStatus('同步失敗', 'error');
            document.getElementById('loginError').textContent = '投票已暫存本機，但雲端同步失敗';
            submitBtn.disabled = false;
        }
    }

    function showFlash() {
        const flash = document.getElementById('successFlash');
        flash.style.display = 'block';
        setTimeout(() => {
            flash.style.display = 'none';
            loadNextPair();
        }, 600);
    }

    function calcElo() {
        const votes = getVotes(currentEvaluator);
        const elo = {};
        for (const c of config.conditions) elo[c] = { rating: 1000, wins: 0, draws: 0, losses: 0 };

        for (const v of votes) {
            const a = v.condition_a, b = v.condition_b;
            if (!elo[a] || !elo[b]) continue;

            const ea = 1 / (1 + Math.pow(10, (elo[b].rating - elo[a].rating) / 400));
            const eb = 1 - ea;
            const K = 32;

            let sa, sb;
            if (v.winner === 'a') { sa = 1; sb = 0; elo[a].wins++; elo[b].losses++; }
            else if (v.winner === 'b') { sa = 0; sb = 1; elo[b].wins++; elo[a].losses++; }
            else { sa = 0.5; sb = 0.5; elo[a].draws++; elo[b].draws++; }

            elo[a].rating += K * (sa - ea);
            elo[b].rating += K * (sb - eb);
        }

        return Object.entries(elo)
            .map(([cond, d]) => ({
                condition: cond,
                label: config.condition_labels[cond] || cond,
                rating: Math.round(d.rating),
                wins: d.wins, draws: d.draws, losses: d.losses
            }))
            .sort((x, y) => y.rating - x.rating);
    }

    function renderLeaderboard() {
        const body = document.getElementById('lbBody');
        const rankings = calcElo();
        const votes = getVotes(currentEvaluator);

        if (votes.length === 0) {
            body.innerHTML = '<div class="lb-empty">尚無投票紀錄</div>';
            return;
        }

        let html = '<table class="lb-table"><thead><tr>';
        html += '<th>#</th><th>Condition</th><th>Elo</th><th>戰績</th>';
        html += '</tr></thead><tbody>';

        rankings.forEach((r, i) => {
            html += '<tr>';
            html += '<td class="lb-rank">' + (i + 1) + '</td>';
            html += '<td>' + escapeHtml(r.label) + '</td>';
            html += '<td class="lb-elo">' + r.rating + '</td>';
            html += '<td class="lb-record">' + r.wins + 'W / ' + r.draws + 'D / ' + r.losses + 'L</td>';
            html += '</tr>';
        });

        html += '</tbody></table>';
        body.innerHTML = html;
    }

    function initLeaderboard() {
        const toggle = document.getElementById('lbToggle');
        const panel = document.getElementById('lbPanel');
        const close = document.getElementById('lbClose');

        toggle.addEventListener('click', () => {
            const showing = panel.classList.toggle('show');
            toggle.textContent = showing ? '排行榜 ▼' : '排行榜 ▲';
            if (showing) renderLeaderboard();
        });
        close.addEventListener('click', () => {
            panel.classList.remove('show');
            toggle.textContent = '排行榜 ▲';
        });
    }

    function initTimeline() {
        document.getElementById('btnTimeline').addEventListener('click', openTlModal);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeTlModal();
        });
    }

    function initExportClear() {
        document.getElementById('btnExport').addEventListener('click', () => {
            const votes = getVotes(currentEvaluator);
            const blob = new Blob([JSON.stringify(votes, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'arena_votes_' + (currentEvaluator || 'all') + '_' + new Date().toISOString().slice(0,10) + '.json';
            a.click();
            URL.revokeObjectURL(url);
        });

        document.getElementById('btnClear').addEventListener('click', async () => {
            if (confirm('確定要清除所有投票紀錄嗎？此操作無法復原。')) {
                await clearArenaVotes();
                updateProgress();
                await loadNextPair();
            }
        });

        document.getElementById('btnLogout').addEventListener('click', logout);
    }

    function initEvalSelector() {
        const select = document.getElementById('evalSelect');
        select.addEventListener('change', async () => {
            const profile = getAuthProfile();
            if (!profile || profile.role !== 'admin') return;
            setEvaluator(select.value);
            document.getElementById('userBadge').textContent = '管理員檢視 ' + currentEvaluator;
            const uid = await lookupArenaUidByName(currentEvaluator);
            if (uid) await restoreArenaVotes(currentEvaluator, uid);
            else saveVotesForEvaluator(currentEvaluator, []);
            updateProgress();
            await loadNextPair();
        });
    }

    function populateEvalSelector() {
        const select = document.getElementById('evalSelect');
        select.innerHTML = '';
        const profile = getAuthProfile();
        const evaluators = Object.keys(ARENA_USERS).filter(name => name !== 'admin');
        const visibleEvaluators = profile && profile.role === 'admin' ? evaluators : [currentEvaluator];
        visibleEvaluators.forEach(ev => {
            const opt = document.createElement('option');
            opt.value = ev;
            opt.textContent = '評審 ' + ev;
            if (ev === currentEvaluator) opt.selected = true;
            select.appendChild(opt);
        });
        select.disabled = !(profile && profile.role === 'admin');
    }

    function applyAuthProfile(profile) {
        if (!profile) return;
        if (profile.role === 'admin') {
            currentEvaluator = currentEvaluator || 'A';
            document.getElementById('userBadge').textContent = '管理員';
            applyReadOnlyMode(true);
            setAdminMode(true);
        } else {
            currentEvaluator = profile.name;
            document.getElementById('userBadge').textContent = '評審 ' + profile.name;
            applyReadOnlyMode(false);
            setAdminMode(false);
        }
        populateEvalSelector();
    }

    async function handleAuthStateChanged(user) {
        if (!user) {
            clearLocalSessionProfile();
            currentEvaluator = null;
            showLoginOverlay();
            document.getElementById('userBadge').textContent = '未登入';
            setCloudStatus('雲端待命', '');
            return;
        }

        const profile = getAuthProfile(user);
        if (!profile) {
            await auth.signOut();
            return;
        }

        hideLoginOverlay();
        setLocalSessionProfile(profile.name, profile.role);
        document.getElementById('loginError').textContent = '';
        await syncArenaUserIndex(user, profile);
        applyAuthProfile(profile);
        if (profile.role !== 'admin') {
            await restoreArenaVotes(profile.name, user.uid);
        } else {
            const target = currentEvaluator || 'A';
            currentEvaluator = target;
            const targetUid = await lookupArenaUidByName(target);
            if (targetUid) await restoreArenaVotes(target, targetUid);
            else saveVotesForEvaluator(target, []);
            setCloudStatus('管理模式', '');
            await renderAdminContent();
        }
        updateProgress();
        await loadNextPair();
    }

    async function init() {
        try {
            config = await fetchJson('./data/arena_config.json');
        } catch (e) {
            document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#ef4444;">無法載入 arena_config.json</div>';
            return;
        }

        initVoteButtons();
        initLeaderboard();
        initExportClear();
        initEvalSelector();
        initTimeline();
        initAdminPanel();
        showLoginOverlay();
        appReady = true;
        auth.onAuthStateChanged((user) => {
            if (!appReady) return;
            handleAuthStateChanged(user).catch(err => {
                console.error('Arena auth flow failed:', err);
                document.getElementById('loginError').textContent = '初始化失敗，請重新整理';
            });
        });
    }

    init();
})();
</script>
